<head>

    <title>PEKO AI • Admin Panel</title>

    <style>
        :root {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.7);
            --text: #0f172a;
            --muted: #64748b;
            --border: rgba(0, 0, 0, 0.08);
            --glass: blur(18px);
            --pri: #4f46e5;
        }

        .dark {
            --bg: #1e293b;
            --card: rgba(30, 41, 59, 0.7);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%; 
            overflow: hidden; 
            position: fixed; /* 🔥 ম্যাজিক ফিক্স: এটি দিলে মোবাইল পেজকে উপরে ধাক্কা দিতে পারবে না, টপবার একদম স্থির থাকবে */
        }

        body {
            font-family: system-ui;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            backdrop-filter: var(--glass);
            background: var(--card);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0; /* টপবার স্থির রাখবে */
            z-index: 1000;
        }

        .title {
            font-weight: 700;
            font-size: 18px;
        }

        .toggle {
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 10px;
            background: var(--pri);
            color: #fff;
            border: none;
        }

        /* CONTAINER */
        .container {
            max-width: 1100px;
            margin: 0 auto; 
            padding: 20px;
            width: 100%;
        }
        
        .container:not(#grid) {
            flex-shrink: 0; /* ফিল্টার অপশন স্থির রাখবে */
        }

        /* 🔥 ম্যাজিক: শুধু মেসেজ স্ক্রল হবে এবং মোবাইলে ডেটা শো করবে */
        #grid {
            flex: 1;
            min-height: 0; /* 🔥 এটি না দিলে মোবাইলে ফ্লেক্সবক্স ক্র্যাশ করে এবং ডেটা ব্ল্যাঙ্ক হয়ে যায়! এটি দিতেই হবে */
            overflow-y: auto;
            padding-bottom: 60px;
            -webkit-overflow-scrolling: touch; 
        }
        
        #grid::-webkit-scrollbar { display: none; }
        #grid { scrollbar-width: none; -ms-overflow-style: none; }

        /* ===== CLEAN PREMIUM FILTER (STABLE VERSION) ===== */

        #timeFilter {
            width: 200px;
            padding: 8px 12px;

            border-radius: 10px;
            border: 1px solid var(--border);

            background: var(--card);
            color: var(--text);

            font-size: 13px;
            font-weight: 500;

            backdrop-filter: var(--glass);

            cursor: pointer;

            transition: border 0.2s ease, box-shadow 0.2s ease;
        }

        /* subtle hover (no movement) */
        #timeFilter:hover {
            border-color: var(--pri);
        }

        /* clean focus */
        #timeFilter:focus {
            outline: none;
            border-color: var(--pri);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
        }

        /* dropdown menu (important) */
        #timeFilter option {
            background: #0f172a;
            color: #ffffff;
            font-size: 13px;
        }

        /* dark mode adjust */
        .dark #timeFilter {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }



        /* CARD */
        .card {
            background: var(--card);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        /* TEXT */
        .name {
            font-weight: 600
        }

        .email {
            font-size: 12px;
            color: var(--muted)
        }

        .meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        .q {
            margin-top: 6px;
            word-break: break-word;
            overflow-wrap: anywhere;
            white-space: pre-wrap;
        }

        /* ACTIONS */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .icon {
            border: none;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            transition: 0.25s;
            backdrop-filter: var(--glass);
        }

        .icon:hover {
            transform: scale(1.1)
        }

        .copy {
            background: rgba(79, 70, 229, 0.15);
            color: #4f46e5;
        }

        .copy:hover {
            background: #4f46e5;
            color: #fff;
            transform: scale(1.05);
        }




        .del {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .del:hover {
            background: #ef4444;
            color: #fff;
            transform: scale(1.05);
        }

        /* LOGIN */
        #authBox {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            background: #0b1220;
            color: #fff;
            z-index: 9999;
            isolation: isolate;
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: none;
            width: 260px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: #fff;
            cursor: pointer;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            opacity: 0;
            transition: .3s;
        }

        .toast.show {
            opacity: 1
        }

        /* ===== VERIFY UPGRADE ===== */
        /* ===== VERIFY UPGRADE (PREMIUM CLEAN VERSION) ===== */

        .verifyBox {
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(0, 255, 150, 0.25);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(14px);
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 150, 0.08);
        }

        /* TITLE */
        .verifyTitle {
            color: #00ff9c;
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* SUB TEXT */
        .verifySub {
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 15px;
        }

        /* ===== VERIFY FINAL (STABLE PREMIUM UI) ===== */

        .verifyBox {
            position: relative;
            z-index: 2;
            width: 420px;
            max-width: 90%;
            padding: 30px 24px;

            background: rgba(0, 0, 0, 0.65);
            border-radius: 18px;

            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        /* TITLE */
        .verifyTitle {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
        }

        /* SUB TEXT */
        .verifySub {
            color: #d1d5db;
            font-size: 13px;
        }

        /* INPUT */
        .inputBox {
            width: 100%;
            padding: 12px 14px;

            border-radius: 12px;
            border: 1px solid #d1d5db;

            background: #ffffff;
            color: #000000;

            font-size: 16px; /* 🔥 অ্যাপলে অটো-জুম ঠেকানোর জন্য */
            outline: none;

            transition: 0.2s;
        }

        /* INPUT FOCUS */
        .inputBox:focus {
            border: 1px solid #00eaff;
            box-shadow: 0 0 0 2px rgba(0, 234, 255, 0.2);
        }

        /* ERROR (shape change হবে না) */
        .inputBox.error {
            border: 1px solid #ef4444;
            background: #ffffff;
        }

        /* ERROR TEXT */
        .errorText {
            color: #ef4444;
            font-size: 12px;
            display: none;
        }

        /* ROW (input + button same line থাকবে সবসময়) */
        .inputRow {
            width: 100%;
            display: flex;
            gap: 10px;
        }

        /* BUTTON */
        .btnVerify {
            white-space: nowrap;
            padding: 12px 18px;

            border-radius: 12px;
            border: none;

            background: #ffffff;
            color: #000000;

            font-weight: 600;
            cursor: pointer;

            transition: 0.25s;
        }

        /* BUTTON HOVER */
        .btnVerify:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
        }

        /* MOBILE FIX (shape break হবে না) */
        @media(max-width: 500px) {
            .inputRow {
                flex-direction: column;
            }

            .btnVerify {
                width: 100%;
            }
        }

        /* ===== MODERN LOGIN UI ===== */

        .authContainer {
            width: 700px;
            max-width: 95%;
            height: 320px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            margin: auto;
            background: white;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            transition: 0.5s;
        }

        /* PANEL */
        .panel {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* LEFT */
        .leftPanel {
            background: linear-gradient(135deg, #6d5dfc, #8f6eff);
            color: white;
            text-align: center;
        }

        /* RIGHT */
        .rightPanel {
            background: white;
            color: black;
        }

        /* INPUT */
        .inputBox {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        /* BUTTON */
        .btnVerify {
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #6d5dfc;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        /* SWITCH BUTTON */
        .switchBtn {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid white;
            background: transparent;
            color: white;
            cursor: pointer;
        }

        /* ERROR */
        .errorText {
            color: red;
            font-size: 12px;
            display: none;
        }

        /* TOGGLE MODE */
        .authContainer.active .leftPanel {
            order: 2;
        }

        .authContainer.active .rightPanel {
            order: 1;
        }

        /* MOBILE */
        @media(max-width:600px) {
            .authContainer {
                flex-direction: column;
                height: auto;
            }
        }


















        /* TOGGLE SWITCH */
        .switch {
            position: relative;
            width: 50px;
            height: 26px;
        }

        .switch input {
            display: none;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #cbd5f5;
            border-radius: 30px;
            transition: 0.3s;
        }

        .slider::before {
            content: "";
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            top: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked+.slider {
            background: #4f46e5;
        }

        input:checked+.slider::before {
            transform: translateX(24px);
        }


























        /* ===== PREMIUM DELETE MODAL ===== */

        #confirmBox {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;

            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);

            z-index: 9999;

            animation: fadeIn 0.3s ease;
        }

        /* modal card */
        #confirmBox>div {
            background: var(--card);
            color: var(--text);

            padding: 22px;
            width: 300px;

            border-radius: 18px;
            text-align: center;

            border: 1px solid var(--border);

            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);

            animation: scaleIn 0.25s ease;
        }

        /* text */
        #confirmBox div div:first-child {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* buttons container */
        #confirmBox div div:last-child {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }

        /* delete button */
        #confirmBox button:first-child {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;

            background: #ef4444;
            color: white;

            cursor: pointer;
            transition: 0.2s;
        }

        #confirmBox button:first-child:hover {
            background: #dc2626;
        }

        /* cancel button */
        #confirmBox button:last-child {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;

            background: var(--pri);
            color: white;

            cursor: pointer;
            transition: 0.2s;
        }

        #confirmBox button:last-child:hover {
            opacity: 0.9;
        }

        /* animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

*{

/* =======================================
           🔥 PREMIUM REPORT CARD UI (BY MASTER DEVELOPER)
           ======================================= */
        .reportsContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 24px;
            width: 100%;
        }

        .reportCard {
            background: var(--card);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .reportCard:hover {
            transform: translateY(-4px);
        }

        .reportCardHeader {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .reportUserIcon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: color-mix(in srgb, var(--pri) 15%, transparent);
            color: var(--pri);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .reportMeta {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .reportUserName {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .reportUserEmail {
            font-size: 12px;
            color: var(--muted);
            word-break: break-all;
        }

        .reportContent {
            font-size: 14px;

            background: rgba(0, 0, 0, 0.02);
            padding: 12px;
            border-radius: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            flex: 1;
        }

        .dark .reportContent {
            background: rgba(255, 255, 255, 0.03);
        }

        .reportFooterTime {
            font-size: 11px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
            border-top: 1px solid var(--border);
            padding-top: 8px;
        }

        /* 👑 PREMIUM LANDSCAPE POPUP CSS SYSTEMS */
        .premium-popup-flex {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            gap: 20px !important;
            text-align: left !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }
        .popup-icon-zone {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            flex-shrink: 0 !important;
        }
        .popup-content-zone {
            flex: 1 !important;
            display: flex !important;

            gap: 8px !important;

        }
        .popup-landscape-card {

            gap: 6px !important;

            box-sizing: border-box !important;
        }
        .popup-card-row {
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
            width: 100% !important;
        }
        .popup-card-label {
            font-size: 13px !important;
            font-weight: 600 !important;

        }
        .popup-card-value {

        }
        
        /* মোবাইল স্ক্রিনের জন্য ফ্লেক্সবক্স অটো অ্যাডজাস্টমেন্ট */
        @media (max-width: 480px) {
            .premium-popup-flex {
                flex-direction: column !important;
                text-align: center !important;
                gap: 12px !important;
            }
            .popup-landscape-card {
                padding: 8px 10px !important;
            }
        }

    </style>
</head>

// 🎨 কাস্টম অ্যালার্ট বক্স ফাংশন (ডিফল্ট alert / confirm এর সম্পূর্ণ বিকল্প)
function showCustomAlert(message) {
    const confirmBox = document.getElementById("confirmBox");
    const confirmMessage = document.getElementById("confirmMessage");
    if (!confirmBox || !confirmMessage) return;

    confirmMessage.innerHTML = message;
    confirmBox.style.display = "flex";
    
    // কনফার্ম বক্সের ভেতরের বাটন এরিয়া কাস্টমাইজ করে শুধু একটি ওয়ান-ওয়ে ক্লোজ বাটন রাখা
    const buttonGroup = confirmBox.querySelector("div[style*='display:flex']");
    if (buttonGroup) {
        buttonGroup.innerHTML = `
            <button onclick="closeCustomAlert()" style="background:var(--pri); color:white; border:none; padding:10px 24px; border-radius:12px; font-weight:600; cursor:pointer; font-size:13.5px; width:100%; min-height:40px; display:flex; align-items:center; justify-content:center;">ঠিক আছে</button>
        `;
    }
}

window.closeCustomAlert = function() {
    const confirmBox = document.getElementById("confirmBox");
    if (confirmBox) confirmBox.style.display = "none";
};

// 🤝 কাস্টম কনফার্ম বক্স ফাংশন
function showCustomConfirm(message, onConfirmCallback) {
    const confirmBox = document.getElementById("confirmBox");
    const confirmMessage = document.getElementById("confirmMessage");
    if (!confirmBox || !confirmMessage) return;

    confirmMessage.innerHTML = message;
    confirmBox.style.display = "flex";

    const buttonGroup = confirmBox.querySelector("div[style*='display:flex']");
    if (buttonGroup) {
        buttonGroup.innerHTML = `
            <button id="customCancelBtn" style="flex:1; background:rgba(0,0,0,0.05); color:var(--text); border:none; padding:10px 16px; border-radius:12px; font-weight:600; cursor:pointer; font-size:13.5px; min-height:40px; display:flex; align-items:center; justify-content:center;">বাতিল</button>
            <button id="customConfirmBtn" style="flex:1; background:#ef4444; color:white; border:none; padding:10px 16px; border-radius:12px; font-weight:600; cursor:pointer; font-size:13.5px; min-height:40px; display:flex; align-items:center; justify-content:center;">হ্যাঁ, ডিলিট করুন</button>
        `;

        document.getElementById("customCancelBtn").onclick = function() {
            confirmBox.style.display = "none";
        };

        document.getElementById("customConfirmBtn").onclick = function() {
            confirmBox.style.display = "none";
            if (typeof onConfirmCallback === "function") onConfirmCallback();
        };
    }
}

// 📅 কাস্টম মেম্বারশিপ মেয়াদ নির্ধারণ পপআপ মডাল (মিনিট, ঘণ্টা, দিন ও মাসের আল্ট্রা কন্ট্রোল মেকানিজম)
function showCustomDaysPrompt(onSuccessCallback, onCancelCallback) {
    let promptModal = document.getElementById("customPromptModal");
    if (!promptModal) {
        promptModal = document.createElement("div");
        promptModal.id = "customPromptModal";
        promptModal.style = "position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(15, 23, 42, 0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index:99999; padding:16px; box-sizing:border-box;";
        document.body.appendChild(promptModal);
    }

    // ১০০% কাস্টম ল্যান্ডস্কেপ উইন্ডো ইনজেকশন উইথ টাইম ইউনিট ড্রপডাউন
    promptModal.innerHTML = `
        <div style="background:var(--card); padding:24px; border-radius:24px; width:100%; max-width:420px; text-align:center; border:1px solid var(--border); backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; animation: scaleIn 0.25s ease;">
            <div style="font-weight:700; color:var(--text); font-size:17px; letter-spacing: -0.3px;">👑 মেম্বারশিপ মেয়াদ নির্ধারণ করুন</div>
            <div style="font-size:12px; color:var(--muted); line-height:1.4;">এই ইউজারকে কত সময়ের জন্য PRO মেম্বারশিপ দিতে চান? সংখ্যা এবং ইউনিট সিলেক্ট করুন।</div>
            
            <div style="display:flex; gap:10px; margin: 4px 0; width:100%; box-sizing:border-box;">
                <input type="number" id="customPromptValueInput" value="7" min="1" style="flex:1; padding:11px; border-radius:12px; border:1px solid var(--border); background:rgba(0,0,0,0.02); color:var(--text); font-weight:600; text-align:center; font-size:15px; outline:none; box-sizing:border-box; width:50%;">
                <select id="customPromptUnitSelect" style="flex:1; padding:11px; border-radius:12px; border:1px solid var(--border); background: var(--bg); color:var(--text); font-weight:600; font-size:14px; outline:none; cursor:pointer; box-sizing:border-box; width:50%;">
                    <option value="minutes">মিনিট (Minutes)</option>
                    <option value="hours">ঘণ্টা (Hours)</option>
                    <option value="days" selected>দিন (Days)</option>
                    <option value="months">মাস (Months)</option>
                </select>
            </div>

            <div style="display:flex; gap:12px; justify-content:center; width:100%; box-sizing:border-box; margin-top:5px;">
                <button id="promptCancelBtn" style="flex:1; background:rgba(0,0,0,0.05); color:var(--text); border:none; padding:10px 16px; border-radius:12px; font-weight:600; cursor:pointer; font-size:13.5px; min-height:40px; display:flex; align-items:center; justify-content:center;">বাতিল</button>
                <button id="promptSubmitBtn" style="flex:1; background:var(--pri); color:white; border:none; padding:10px 16px; border-radius:12px; font-weight:600; cursor:pointer; font-size:13.5px; min-height:40px; display:flex; align-items:center; justify-content:center;">অ্যাক্টিভ করুন</button>
            </div>
        </div>
    `;

    const valueField = document.getElementById("customPromptValueInput");
    const unitField = document.getElementById("customPromptUnitSelect");
    promptModal.style.display = "flex";
    valueField.focus();

    document.getElementById("promptCancelBtn").onclick = function() {
        promptModal.style.display = "none";
        if (typeof onCancelCallback === "function") onCancelCallback();
    };

    document.getElementById("promptSubmitBtn").onclick = function() {
        const rawValue = valueField.value.trim();
        const amount = parseInt(rawValue);
        const unit = unitField.value;

        if (isNaN(amount) || amount <= 0) {
            toast("❌ দয়া করে সঠিক সংখ্যা ইনপুট দিন!");
            return;
        }

        // কাস্টম টাইম ইউনিট কনভার্সন মেকানিজম (মিনিট, ঘণ্টা, দিন, মাস)
        let durationMiliseconds = 0;
        if (unit === "minutes") {
            durationMiliseconds = amount * 60 * 1000;
        } else if (unit === "hours") {
            durationMiliseconds = amount * 60 * 60 * 1000;
        } else if (unit === "days") {
            durationMiliseconds = amount * 24 * 60 * 60 * 1000;
        } else if (unit === "months") {
            // সর্বোচ্চ ১ মাস লিমিট সেফটি প্রোটেকশন
            if (amount > 1) {
                toast("⚠ সর্বোচ্চ ১ মাস মেম্বারশিপ দেওয়া যাবে!");
                valueField.value = "1";
                return;
            }
            durationMiliseconds = amount * 30 * 24 * 60 * 60 * 1000;
        }

        promptModal.style.display = "none";
        if (typeof onSuccessCallback === "function") onSuccessCallback(durationMiliseconds, amount, unit);
    };
}

                targetTab = "active";
            }

            if (targetTab !== window.currentProTab) return;
            itemsCount++;

            const dateStr = data.time ? new Date(data.time).toLocaleString('bn-BD') : "N/A";

            let deleteButtonHtml = "";

            if (data.status === "active") {
                statusLabel = `<span id="status_lbl_${reqId}" style="color: #10b981; font-weight: 700; font-size: 12px;">🟢 Active Member</span>`;
                deleteButtonHtml = `<button onclick="deleteProUserRequest('${reqId}', '${data.uid}', 'active')" style="margin-left: 10px; background: rgba(239, 68, 68, 0.08); color: #ef4444; border: none; padding: 5px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 11px; transition: 0.2s;">Delete</button>`;
            } else if (data.status === "expired") {

                    <div style="font-size: 12px; font-weight: 700; margin-top: 4px;">
                        <a href="tel:${data.phone}" style="color: var(--pri); text-decoration: none; display: inline-flex; align-items: center; gap: 4px;">📞 ${data.phone || 'No Number'}</a>

                <td style="padding: 12px 8px; color: var(--text); vertical-align: middle;">
                    <span style="background: rgba(79, 70, 229, 0.1); color: var(--pri); padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; display: inline-block;">

                        if (timerBox) timerBox.style.display = "block";

                        const intId = setInterval(() => {
                            const savedEndTime = localStorage.getItem(`offline_pro_end_${item.userUid}`) || uData.proEndDate;
                            const timeLeft = savedEndTime - Date.now();
                            const liveTimerBox = document.getElementById(`admin_timer_${item.reqId}`);
                            
                            if (timeLeft <= 0) {
                                if (liveTimerBox) liveTimerBox.innerHTML = "❌ মেয়াদ শেষ";
                                clearInterval(intId);
                                
                                DB.ref(`users/${item.userUid}`).update({ isPro: false, proStartDate: 0, proEndDate: 0 });
                                DB.ref(`pro_requests/${item.reqId}`).update({ status: "expired" });
                                localStorage.removeItem(`offline_pro_end_${item.userUid}`);
                                return;
                            }

                            const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

                            if (liveTimerBox) {
                                liveTimerBox.innerHTML = `⏳ বাকি: ${days}দিন ${hours}ঘ ${minutes}মি ${seconds}সে`;
                            }
                        }, 1000);
                        
                        window.adminTimerIntervals.push(intId);
                    } else {
                        if (timerBox) timerBox.style.display = "none";
                    }
                });
            });
        }
    });
}

function toggleUserPremium(requestId, userUid, toggleElement) {
    const isActivating = toggleElement.checked;

    if (isActivating === true) {
        showCustomDaysPrompt((durationMiliseconds, amount, unit) => {
            const now = Date.now();
            const expireTime = now + durationMiliseconds;

            let unitText = unit === "minutes" ? "মিনিট" : unit === "hours" ? "ঘণ্টা" : unit === "months" ? "মাস" : "দিন";

            DB.ref(`pro_requests/${requestId}`).update({ status: "active" })
            .then(() => {
                return DB.ref(`users/${userUid}`).update({ 
                    isPro: true,
                    proStartDate: now,
                    proEndDate: expireTime
                });
            })
            .then(() => {
                localStorage.setItem(`offline_pro_end_${userUid}`, expireTime);
                toast(`ইউজারকে সফলভাবে ${amount} ${unitText} এর জন্য PRO করা হয়েছে! 👑`);
                window.switchProTab('active');
            })
            .catch((error) => {
                toggleElement.checked = false;
                toast("ডাটাবেজ আপডেট ব্যর্থ হয়েছে");
            });
        }, () => {
            toggleElement.checked = false;
        });

    } else {
        DB.ref(`pro_requests/${requestId}`).update({ status: "expired" })
        .then(() => {
            return DB.ref(`users/${userUid}`).update({
                isPro: false,
                proStartDate: 0,
                proEndDate: 0
            });
        })
        .then(() => {
            localStorage.removeItem(`offline_pro_end_${userUid}`);
            toast("ইউজারের PRO স্ট্যাটাস সফলভাবে বন্ধ করা হয়েছে। 🔒");
            window.switchProTab('active');
        })
        .catch((error) => {
            toggleElement.checked = true;
            toast("ডাটাবেজ আপডেট ব্যর্থ হয়েছে");
        });
    }
}

// 🔥 REAL-TIME REPORT MANAGEMENT LOGIC (BY MASTER DEVELOPER)
// =======================================
function listenToReports() {
    const reportsListContainer = document.getElementById("reportsList");

    if (reportsListContainer) {
        // ফায়ারবেসের 'all_reports' নোড থেকে রিয়েল-টাইম ডাটা লিসেন করা হচ্ছে
        DB.ref("all_reports").on("value", (snapshot) => {
            reportsListContainer.innerHTML = ""; // আগের ডাটা ক্লিয়ার করা হচ্ছে

            if (!snapshot.exists()) {
                reportsListContainer.innerHTML = `<div style="color: var(--muted); font-size: 14px; padding: 10px;">কোনো রিপোর্ট পাওয়া যায়নি।</div>`;
                return;
            }

            let reportsHtml = "";
            
            // অবজেক্টটিকে লুপ ঘুরিয়ে প্রত্যেকটি রিপোর্ট আলাদা করা
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                
                // এক্সাক্ট টাইমস্ট্যাম্পকে মানুষের পড়ার উপযোগী লোকাল টাইমে কনভার্ট করা (তারিখ, মাস, বছর এবং সেকেন্ডসহ সময়)
                const exactDate = new Date(data.time);
                const formattedTime = exactDate.toLocaleString("bn-BD", {
                    year: "numeric",
                    month: "long",
                    day: "numeric",
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit",
                    hour12: true
                });

                // ইউজারের নামের প্রথম অক্ষর আইকনের জন্য নেওয়া
                const firstLetter = (data.name || "U").charAt(0).toUpperCase();

                // রেসপন্সিভカード জেনারেট করা (🔥 COPY & SINGLE DELETE BUTTON ADDED)
                reportsHtml += `
                    <div class="reportCard" id="card_rep_${childSnapshot.key}">
                        <div class="reportCardHeader">
                            <div class="reportUserIcon">${firstLetter}</div>
                            <div class="reportMeta">
                                <span class="reportUserName">${data.name || "Anonymous User"}</span>
                                <span class="reportUserEmail">${data.email || "No Email Provided"}</span>
                            </div>
                        </div>
                        <div class="reportContent" id="text_rep_${childSnapshot.key}">${data.report || ""}</div>
                        
                        <div class="actions" style="margin-top: 5px;">
                            <button class="icon copy" onclick="copyReport('${childSnapshot.key}')">Copy</button>
                            <button class="icon del" onclick="delReport('${childSnapshot.key}')">Delete</button>
                        </div>

                        <div class="reportFooterTime">
                            <span>🕒</span>
                            <span>${formattedTime}</span>
                        </div>
                    </div>
                `;
            });

            // কন্টেইনারে ইনজেক্ট করা হচ্ছে
            reportsListContainer.innerHTML = reportsHtml;
        }, (error) => {
            console.error("Firebase Report Fetch Error:", error);
            reportsListContainer.innerHTML = `<div style="color: #ef4444; font-size: 14px; padding: 10px;">ডাটা লোড করতে সমস্যা হয়েছে!</div>`;
        });
    }
} // 🔥 এই ক্লোজিং ব্র্যাকেটটি দিয়ে ফাংশনটি নিখুঁতভাবে শেষ করা হলো (এররটি চলে যাবে)
