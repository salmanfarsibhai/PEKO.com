<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEKO AI • Admin</title>

    <style>
        /* ===== SAME YOUR DESIGN (unchanged) ===== */
        :root {
            --bg: #0b1220;
            --card: #0f172a;
            --muted: #94a3b8;
            --text: #e5e7eb;
            --pri: #4f46e5;
            --pri2: #7c3aed;
            --border: #1f2937;
            --danger: #ef4444;
        }

        .light {
            --bg: #f6f8ff;
            --card: #fff;
            --muted: #6b7280;
            --text: #0f172a;
            --pri: #4f46e5;
            --pri2: #7c3aed;
            --border: #e5e7eb;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: system-ui;
            background: linear-gradient(135deg, var(--bg), #0b1220);
            color: var(--text)
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 14px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #4f46e5, #7c3aed)
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 8px 10px;
            cursor: pointer;
            background: rgba(255, 255, 255, .15);
            color: #fff
        }

        .container {
            max-width: 1100px;
            margin: 14px auto;
            padding: 0 12px
        }

        .grid {
            display: grid;
            gap: 10px
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            animation: fade .25s
        }

        @keyframes fade {
            from {
                opacity: .6;
                transform: translateY(8px)
            }

            to {
                opacity: 1
            }
        }

        .icon {
            border-radius: 8px;
            padding: 6px;
            cursor: pointer;
            border: 1px solid var(--border)
        }

        .icon.del {
            color: red
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            opacity: 0;
            transition: .3s
        }

        .toast.show {
            opacity: 1
        }

        /* ===== LOGIN SCREEN ===== */
        #authBox {
            position: fixed;
            inset: 0;
            background: #0b1220;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
            z-index: 9999;
            color: #fff;
        }

        .loginBtn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <!-- 🔐 LOGIN SCREEN -->
    <div id="authBox">
        <h2>Admin Login Required</h2>
        <button class="loginBtn" onclick="login()">Login with Google</button>
    </div>

    <!-- ===== MAIN UI ===== -->
    <div class="header">
        <div>PEKO AI • Admin</div>
        <div>
            <button id="themeBtn" class="btn">Theme</button>
            <button id="logoutBtn" class="btn">Logout</button>
            <button id="clearBtn" class="btn">Clear All</button>
        </div>
    </div>

    <div class="container">
        <input id="search" placeholder="Search..." class="btn" style="width:100%;margin-bottom:10px">
        <div id="grid" class="grid"></div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- ===== Firebase ===== -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ===== CONFIG =====
        const firebaseConfig = {
            apiKey: "AIzaSyCRafdTA1UA6uTTcACZNWOf02T1sGcdToQ",
            authDomain: "peko-ai.firebaseapp.com",
            databaseURL: "https://peko-ai-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "peko-ai"
        };
        firebase.initializeApp(firebaseConfig);

        const DB = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // 👉 নিজের email বসাও
        const ADMIN_EMAIL = "salmanfarsi172007@gmail.com";

        // ===== LOGIN =====
        function login() {
            auth.signInWithPopup(provider);
        }

        // ===== LOGOUT =====
        document.getElementById("logoutBtn").onclick = () => {
            auth.signOut();
        };

        // ===== AUTH CHECK =====
        auth.onAuthStateChanged(user => {
            if (user) {
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById("authBox").style.display = "none";
                } else {
                    alert("Access Denied");
                    auth.signOut();
                }
            }
        });

        // ===== UI =====
        const grid = document.getElementById("grid");
        const toast = (t) => { let el = document.getElementById("toast"); el.innerText = t; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 1500) };

        // ===== DATA =====
        let RAW = {};

        DB.ref("all_logs").on("value", snap => {
            RAW = snap.val() || {};
            render();
        });

        // ===== RENDER =====
        function render() {
            grid.innerHTML = "";
            Object.entries(RAW).forEach(([k, d]) => {
                let div = document.createElement("div");
                div.className = "card";
                div.innerHTML = `
<b>${escapeHTML(d.name)}</b><br>
<small>${escapeHTML(d.email)}</small>
<p>${escapeHTML(d.question)}</p>
<button class="icon" onclick="copy('${k}')">📋</button>
<button class="icon del" onclick="del('${k}')">🗑️</button>
`;
                grid.appendChild(div);
            });
        }

        // ===== ACTIONS =====
        function copy(k) {
            let d = RAW[k];
            navigator.clipboard.writeText(d.question);
            toast("Copied");
        }

        function del(k) {
            if (confirm("Delete?")) {
                DB.ref("all_logs/" + k).remove();
                toast("Deleted");
            }
        }

        // ===== CLEAR ALL =====
        document.getElementById("clearBtn").onclick = () => {
            if (confirm("Delete all?")) {
                DB.ref("all_logs").remove();
            }
        };

        // ===== SECURITY =====
        function escapeHTML(str) {
            return String(str).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[s]));
        }
    </script>

</body>

</html>
