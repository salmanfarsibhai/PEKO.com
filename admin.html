<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEKO AI • Admin Panel</title>

<style>
:root{
--bg:#f8fafc;
--card:rgba(255,255,255,0.7);
--text:#0f172a;
--muted:#64748b;
--border:rgba(0,0,0,0.08);
--glass:blur(18px);
--pri:#4f46e5;
}

.dark{
--bg:#0b1220;
--card:rgba(15,23,42,0.6);
--text:#e5e7eb;
--muted:#94a3b8;
--border:rgba(255,255,255,0.08);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:system-ui;
background:linear-gradient(135deg,var(--bg),#e2e8f0);
color:var(--text);
min-height:100vh;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 20px;
backdrop-filter:var(--glass);
background:var(--card);
border-bottom:1px solid var(--border);
}

.title{
font-weight:700;
font-size:18px;
}

.toggle{
cursor:pointer;
padding:8px 12px;
border-radius:10px;
background:var(--pri);
color:#fff;
border:none;
}

/* CONTAINER */
.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
background:var(--card);
backdrop-filter:var(--glass);
border:1px solid var(--border);
border-radius:16px;
padding:16px;
margin-bottom:12px;
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

/* TEXT */
.name{font-weight:600}
.email{font-size:12px;color:var(--muted)}
.q{margin-top:6px}

/* ACTIONS */
.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.icon{
border:none;
cursor:pointer;
padding:8px;
border-radius:10px;
background:rgba(255,255,255,0.2);
backdrop-filter:var(--glass);
transition:0.2s;
}

.icon:hover{transform:scale(1.1)}

.copy{color:#4f46e5}
.del{color:#ef4444}

/* LOGIN */
#authBox{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:10px;
background:#0b1220;
color:#fff;
z-index:9999;
}

input{
padding:10px;
border-radius:10px;
border:none;
width:260px;
}

.btn{
padding:10px 20px;
border:none;
border-radius:10px;
background:#4f46e5;
color:#fff;
cursor:pointer;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:10px 14px;
border-radius:10px;
opacity:0;
transition:.3s;
}
.toast.show{opacity:1}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authBox">
<h2>PEKO AI Admin Verification</h2>
<input id="emailInput" placeholder="Enter Admin Email">
<button class="btn" onclick="sendLink()">Verify Access</button>
</div>

<!-- HEADER -->
<div class="header">
<div class="title">PEKO AI • Admin Panel</div>
<button class="toggle" onclick="toggleTheme()">Theme</button>
</div>

<div class="container" id="grid"></div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyCRafdTA1UA6uTTcACZNWOf02T1sGcdToQ",
authDomain:"peko-ai.firebaseapp.com",
databaseURL:"https://peko-ai-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"peko-ai"
};
firebase.initializeApp(firebaseConfig);

const DB=firebase.database();
const auth=firebase.auth();

const ADMIN_EMAIL="salmanfarsi172007@gmail.com";

/* EMAIL OTP LOGIN */
function sendLink(){
const email=document.getElementById("emailInput").value.trim();
if(email!==ADMIN_EMAIL){
alert("Access Denied");
return;
}

const actionCodeSettings={
url:window.location.href,
handleCodeInApp:true
};

auth.sendSignInLinkToEmail(email,actionCodeSettings)
.then(()=>{
localStorage.setItem("emailForSignIn",email);
alert("Check Gmail");
});
}

if(auth.isSignInWithEmailLink(window.location.href)){
let email=localStorage.getItem("emailForSignIn");
auth.signInWithEmailLink(email,window.location.href)
.then(res=>{
if(res.user.email===ADMIN_EMAIL){
document.getElementById("authBox").style.display="none";
}else{
alert("Denied");
}
});
}

/* THEME */
function toggleTheme(){
document.documentElement.classList.toggle("dark");
}

/* TOAST */
function toast(t){
let el=document.getElementById("toast");
el.innerText=t;
el.classList.add("show");
setTimeout(()=>el.classList.remove("show"),1500);
}

/* RENDER DATA */
let RAW={};

DB.ref("all_logs").on("value",snap=>{
RAW=snap.val()||{};
render();
});

function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

Object.entries(RAW).reverse().forEach(([k,d])=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`
<div class="name">${d.name||""}</div>
<div class="email">${d.email||""}</div>
<div class="q">${d.question||""}</div>
<div class="actions">
<button class="icon copy" onclick="copy('${k}')">📋</button>
<button class="icon del" onclick="del('${k}')">🗑️</button>
</div>
`;
grid.appendChild(div);
});
}

/* ACTION */
function copy(k){
navigator.clipboard.writeText(RAW[k].question||"");
toast("Copied");
}

function del(k){
if(confirm("Delete?")){
DB.ref("all_logs/"+k).remove();
toast("Deleted");
}
}
</script>

</body>
</html>
