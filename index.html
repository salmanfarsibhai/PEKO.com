        /* ===== FULL SCREEN PREMIUM LOGIN ===== */

        .loginBox {
            position: fixed;

            display: flex;

            z-index: 9999;

            transform: translateY(0);
        }

        /* fallback for older browsers */

        /* glow effect */
        .loginBox::before {
            content: "";

            height: 200%;

            animation: moveGlow 8s linear infinite;
        }

        @keyframes moveGlow {
            0% {
                transform: translate(-25%, -25%);

                transform: translate(-10%, -10%);

            100% {
                transform: translate(-25%, -25%);

            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);

            animation: fadeIn .5s ease;

            transform: translateZ(0);

        }

        /* subtitle */

.limitPopup{
    position: fixed;

    left: 50%;
    bottom: -100px;

    transform: translateX(-50%);

    background: #0083ff;

    color: white;

    padding: 12px 18px;

    border-radius: 14px;

    font-size: 14px;

    z-index: 999999;

    transition: .4s ease;

    box-shadow: 0 10px 30px rgba(0,131,255,.25);

    opacity: 0;
}

.limitPopup.show{
    bottom: 95px;

    opacity: 1;

    animation: popupBounce .4s ease;
}

@keyframes popupBounce{

    0%{
        transform: translateX(-50%) translateY(40px);
    }

    60%{
        transform: translateX(-50%) translateY(-6px);
    }

    100%{
        transform: translateX(-50%) translateY(0);
    }

}




.pekoLoading{

    background: #e5e7eb;

    display: flex;

    align-items: center;

    gap: 5px;
}

.pekoLoading span{

    width: 8px;
    height: 8px;

    border-radius: 50%;

    background: #0083ff;

    animation: bounce 1s infinite ease-in-out;
}

.pekoLoading span:nth-child(2){
    animation-delay: .15s;
}

.pekoLoading span:nth-child(3){
    animation-delay: .3s;
}

@keyframes bounce{

    0%,80%,100%{
        transform: translateY(0);
        opacity: .4;
    }

    40%{
        transform: translateY(-6px);
        opacity: 1;
    }

}

// ===============================
// RANDOM PICKER
// ===============================

function pick(arr){

    return arr[
        Math.floor(Math.random() * arr.length)
    ];

}



// ===============================
// MAIN DETECTOR
// ===============================

function detectSpamType(text){

    if(!text) return null;

    const q = text.trim();

    const lower = q.toLowerCase();




    // =========================
    // EMPTY / DOT SPAM
    // =========================

    if(/^[.\-_ ]+$/.test(q)){

        return "emptySpam";

    }




    // =========================
    // EMOJI SPAM
    // =========================

    const emojiCount =
        (q.match(/[\u{1F300}-\u{1FAFF}]/gu)||[]).length;

    if(emojiCount >= 4){

        return "emojiSpam";

    }




    // =========================
    // SYMBOL SPAM
    // =========================

    if(/^[^a-zA-Z0-9\u0980-\u09FF]+$/.test(q)){

        return "symbolSpam";

    }




    // =========================
    // REPEATED CHARACTER
    // =========================

    if(/(.)\1{4,}/i.test(q)){

        return "repeatedChars";

    }




    // =========================
    // NUMBER SPAM
    // =========================

    if(/^\d+$/.test(q)){

        return "numberSpam";

    }




    // =========================
    // FAKE MATH
    // =========================

    if(
        /^[0-9+\-*/%=(). ]+$/.test(q)
        &&
        !/^\d+([+\-*/]\d+)+$/.test(q)
    ){

        return "fakeMath";

    }




    // =========================
    // FAKE LINK
    // =========================

    if(

        /(http|www)/i.test(q)
        &&
        !/^https?:\/\/.+\..+/.test(q)

    ){

        return "fakeLink";

    }




    // =========================
    // CAPS SPAM
    // =========================

    if(

        q.length > 6
        &&
        q === q.toUpperCase()
        &&
        /[A-Z]/.test(q)

    ){

        return "capsSpam";

    }




    // =========================
    // USERNAME STYLE
    // =========================

    if(

        /^[a-zA-Z0-9_]{8,20}$/.test(q)
        &&
        /\d/.test(q)
        &&
        /[A-Z]/.test(q)

    ){

        return "usernameSpam";

    }




    // =========================
    // KEYBOARD SMASH ENGLISH
    // =========================

    const englishOnly =
        /^[a-z0-9]+$/i.test(q);

    const vowels =
        (lower.match(/[aeiou]/g)||[]).length;

    if(

        englishOnly
        &&
        q.length >= 6
        &&
        vowels <= 1

    ){

        return "keyboardSmash";

    }




    // =========================
    // BANGLA SMASH
    // =========================

    const banglaOnly =
        /^[\u0980-\u09FF]+$/.test(q);

    if(

        banglaOnly
        &&
        q.length >= 5

    ){

        const banglaReadable =
            /(আমি|তুমি|কি|কেন|হয়|না|এটা|ভালো|কেমন)/.test(q);

        if(!banglaReadable){

            return "banglaSmash";

        }

    }




    // =========================
    // TINY RANDOM NOISE
    // =========================

    if(

        q.length <= 4
        &&
        /^[a-z]+$/i.test(q)

    ){

        const validTinyWords = [

            "hi",
            "hey",
            "ok",
            "yo",
            "no",
            "yes"

        ];

        if(

            !validTinyWords.includes(lower)

        ){

            return "tinyNoise";

        }

    }




    // =========================
    // LONG RANDOM GARBAGE
    // =========================

    if(

        q.length >= 15

    ){

        const spaces =
            (q.match(/ /g)||[]).length;

        const vowels2 =
            (lower.match(/[aeiou]/g)||[]).length;

        if(

            spaces === 0
            &&
            vowels2 <= 2

        ){

            return "longGarbage";

        }

    }




    // =========================
    // MIXED RANDOM GARBAGE
    // =========================

    const hasEnglish =
        /[a-z]/i.test(q);

    const hasBangla =
        /[\u0980-\u09FF]/.test(q);

    const hasNumber =
        /\d/.test(q);

    if(

        (
            hasEnglish +
            hasBangla +
            hasNumber
        ) >= 2

        &&

        q.length >= 8

    ){

        const words =
            q.split(/\s+/);

        if(words.length <= 2){

            return "mixedGarbage";

        }

    }




    // =========================
    // REPEAT WORD SPAM
    // =========================

    const repeatMatch =
        lower.match(/\b(\w+)\s+\1\b/);

    if(repeatMatch){

        return "repeatQuestion";

    }




    return null;

}

// SHORTCUT BLOCK
document.addEventListener("keydown", e => {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }

    // CTRL + SHIFT + I
    if (e.ctrlKey && e.shiftKey && e.key === "I") {
        e.preventDefault();
    }

    // CTRL + SHIFT + J
    if (e.ctrlKey && e.shiftKey && e.key === "J") {
        e.preventDefault();
    }

    // CTRL + U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
    }

    // CTRL + S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
    }

});
