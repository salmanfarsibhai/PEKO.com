<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PEKO AI</title>

    <style>
        :root {
            --bg1: #eef2ff;
            --bg2: #ffffff;
            --pri: #4f46e5;
            --pri2: #7c3aed;
            --text: #0f172a;
            --muted: #6b7280;
            --card: rgba(255, 255, 255, .75);
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: system-ui, Segoe UI, Arial;
            color: var(--text);
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            border-radius: 20px;
            background: var(--card);
            backdrop-filter: blur(18px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn .5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .header {
            padding: 14px 16px;
            background: linear-gradient(135deg, var(--pri), var(--pri2));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-weight: 700;
            letter-spacing: .5px
        }

        .right {
            display: flex;
            gap: 8px;
            align-items: center
        }

        .badge {
            font-size: 12px;
            opacity: .9
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            transition: .2s transform, .2s box-shadow;
        }

        .btn:active {
            transform: scale(.97)
        }

        .btnPrimary {
            background: #fff;
            color: var(--pri);
            font-weight: 600
        }

        .btnGhost {
            background: rgba(255, 255, 255, .2);
            color: #fff
        }

        .loginBox {
            padding: 20px;
            text-align: center
        }

        .loginCard {
            margin: 30px auto;
            max-width: 360px;
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .1);
            animation: fadeIn .4s ease;
        }

        .loginCard h3 {
            margin: 0 0 10px
        }

        .loginCard p {
            margin: 0 0 14px;
            color: var(--muted)
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
        }

        .msg {
            max-width: 70%;
            padding: 10px 12px;
            margin: 6px 0;
            border-radius: 12px;
            position: relative;
            animation: pop .2s ease;
        }

        @keyframes pop {
            from {
                transform: scale(.95);
                opacity: .7
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .user {
            background: linear-gradient(135deg, var(--pri), var(--pri2));
            color: #fff;
            margin-left: auto
        }

        .ai {
            background: #e5e7eb
        }

        .inputBox {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid #e5e7eb;
            background: #fff
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none
        }

        .send {
            background: linear-gradient(135deg, var(--pri), var(--pri2));
            color: #fff
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            transition: .3s
        }

        .toast.show {
            opacity: 1
        }

        @media(max-width:600px) {
            .app {
                height: 100vh;
                border-radius: 0
            }
        }
    </style>
</head>

<body>

    <div class="app">
        <div class="header">
            <div class="brand">PEKO AI</div>
            <div class="right">
                <span id="userInfo" class="badge"></span>
                <button id="logoutBtn" class="btn btnGhost" style="display:none">Logout</button>
            </div>
        </div>

        <div id="loginBox" class="loginBox">
            <div class="loginCard">
                <h3>Welcome</h3>
                <p>Google দিয়ে লগইন করে শুরু করুন</p>
                <button class="btn btnPrimary" onclick="login()">Login with Google</button>
            </div>
        </div>

        <div id="chat" class="chat" style="display:none"></div>

        <div id="inputBox" class="inputBox" style="display:none">
            <input id="input" placeholder="প্রশ্ন লিখুন..." />
            <button class="btn send" id="sendBtn">Send</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ===== CONFIG (তোমার Asia URL ব্যবহার করো) =====
        const firebaseConfig = {
            apiKey: "AIzaSyCRafdTA1UA6uTTcACZNWOf02T1sGcdToQ",
            authDomain: "peko-ai.firebaseapp.com",
            databaseURL: "https://peko-ai-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "peko-ai"
        };

        firebase.initializeApp(firebaseConfig);
        const AUTH = firebase.auth();
        const DB = firebase.database();

        let USER = null;

        // ===== UI HELPERS =====
        const $ = id => document.getElementById(id);
        function toast(t) {
            const el = $("toast"); el.textContent = t; el.classList.add("show");
            setTimeout(() => el.classList.remove("show"), 1800);
        }
        function add(text, type) {
            const d = document.createElement("div");
            d.className = "msg " + type;
            d.textContent = text;
            $("chat").appendChild(d);
            d.scrollIntoView({ behavior: "smooth" });
        }
        function showApp() {
            $("loginBox").style.display = "none";
            $("chat").style.display = "block";
            $("inputBox").style.display = "flex";
            $("logoutBtn").style.display = "inline-block";
        }
        function showLogin() {
            $("loginBox").style.display = "block";
            $("chat").style.display = "none";
            $("inputBox").style.display = "none";
            $("logoutBtn").style.display = "none";
            $("userInfo").textContent = "";
        }

        // ===== AUTH =====
        AUTH.onAuthStateChanged(user => {
            if (user) {
                USER = user;
                $("userInfo").textContent = user.displayName || user.email || "";
                showApp();
            } else {
                USER = null;
                showLogin();
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            AUTH.signInWithPopup(provider).catch(e => {
                console.error(e); toast("Login error");
            });
        }
        $("logoutBtn").onclick = () => {
            AUTH.signOut();
            toast("Logged out");
        };

        // ===== SIMPLE AI =====
        const DATA = [
            { q: ["hello", "hi"], a: ["হ্যালো! কীভাবে সাহায্য করতে পারি?", "স্বাগতম!"] },
            { q: ["capital", "bangladesh"], a: ["বাংলাদেশের রাজধানী ঢাকা"] },
            { q: ["who are you", "tumi ke"], a: ["আমি PEKO AI"] },
            { q: ["salman"], a: ["apni to salman farsi"] },
        ];
        function getAnswer(q) {
            q = q.toLowerCase();
            for (const it of DATA) {
                for (const k of it.q) {
                    if (q.includes(k)) return it.a[Math.floor(Math.random() * it.a.length)];
                }
            }
            return "আমি এখনো শিখছি...";
        }

        // ===== ASK + SAVE =====
        function ask() {
            const text = ($("input").value || "").trim();
            if (!text) { toast("কিছু লিখুন"); return; }
            if (!USER) { toast("আগে লগইন করুন"); return; }

            add(text, "user");
            const ans = getAnswer(text);
            setTimeout(() => add(ans, "ai"), 250);

            const payload = {
                uid: USER.uid,
                name: USER.displayName || "",
                email: USER.email || "",
                question: text,
                time: Date.now()
            };

            DB.ref("all_logs").push(payload)
                .then(() => console.log("SAVE OK"))
                .catch(err => console.error("SAVE ERROR:", err));

            $("input").value = "";
        }

        // ===== EVENTS =====
        $("sendBtn").addEventListener("click", ask);
        $("input").addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); ask(); }
        });
    </script>
</body>

</html>
