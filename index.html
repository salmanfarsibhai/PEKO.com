<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEKO AI • Admin Panel</title>
    <link rel="icon" href="data:,">

    <style>
        :root {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.7);
            --text: #0f172a;
            --muted: #64748b;
            --border: rgba(0, 0, 0, 0.08);
            --glass: blur(18px);
            --pri: #4f46e5;
        }

        .dark {
            --bg: #1e293b;
            --card: rgba(30, 41, 59, 0.7);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: system-ui;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            backdrop-filter: var(--glass);
            background: var(--card);
            border-bottom: 1px solid var(--border);
        }

        .title {
            font-weight: 700;
            font-size: 18px;
        }

        .toggle {
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 10px;
            background: var(--pri);
            color: #fff;
            border: none;
        }

        /* CONTAINER */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }


        /* ===== CLEAN PREMIUM FILTER (STABLE VERSION) ===== */

        #timeFilter {
            width: 200px;
            padding: 8px 12px;

            border-radius: 10px;
            border: 1px solid var(--border);

            background: var(--card);
            color: var(--text);

            font-size: 13px;
            font-weight: 500;

            backdrop-filter: var(--glass);

            cursor: pointer;

            transition: border 0.2s ease, box-shadow 0.2s ease;
        }

        /* subtle hover (no movement) */
        #timeFilter:hover {
            border-color: var(--pri);
        }

        /* clean focus */
        #timeFilter:focus {
            outline: none;
            border-color: var(--pri);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
        }

        /* dropdown menu (important) */
        #timeFilter option {
            background: #0f172a;
            color: #ffffff;
            font-size: 13px;
        }

        /* dark mode adjust */
        .dark #timeFilter {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }



        /* CARD */
        .card {
            background: var(--card);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        /* TEXT */
        .name {
            font-weight: 600
        }

        .email {
            font-size: 12px;
            color: var(--muted)
        }

        .meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        .q {
            margin-top: 6px;
            word-break: break-word;
            overflow-wrap: anywhere;
            white-space: pre-wrap;
        }

        /* ACTIONS */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .icon {
            border: none;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            transition: 0.25s;
            backdrop-filter: var(--glass);
        }

        .icon:hover {
            transform: scale(1.1)
        }

        .copy {
            background: rgba(79, 70, 229, 0.15);
            color: #4f46e5;
        }

        .copy:hover {
            background: #4f46e5;
            color: #fff;
            transform: scale(1.05);
        }




        .del {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .del:hover {
            background: #ef4444;
            color: #fff;
            transform: scale(1.05);
        }

        /* LOGIN */
        #authBox {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            background: #0b1220;
            color: #fff;
            z-index: 9999;
            isolation: isolate;
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: none;
            width: 260px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: #fff;
            cursor: pointer;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            opacity: 0;
            transition: .3s;
        }

        .toast.show {
            opacity: 1
        }

        /* ===== VERIFY UPGRADE ===== */
        /* ===== VERIFY UPGRADE (PREMIUM CLEAN VERSION) ===== */

        .verifyBox {
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(0, 255, 150, 0.25);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(14px);
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 150, 0.08);
        }

        /* TITLE */
        .verifyTitle {
            color: #00ff9c;
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* SUB TEXT */
        .verifySub {
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 15px;
        }

        /* ===== VERIFY FINAL (STABLE PREMIUM UI) ===== */

        .verifyBox {
            position: relative;
            z-index: 2;
            width: 420px;
            max-width: 90%;
            padding: 30px 24px;

            background: rgba(0, 0, 0, 0.65);
            border-radius: 18px;

            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        /* TITLE */
        .verifyTitle {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
        }

        /* SUB TEXT */
        .verifySub {
            color: #d1d5db;
            font-size: 13px;
        }

        /* INPUT */
        .inputBox {
            width: 100%;
            padding: 12px 14px;

            border-radius: 12px;
            border: 1px solid #d1d5db;

            background: #ffffff;
            color: #000000;

            font-size: 14px;
            outline: none;

            transition: 0.2s;
        }

        /* INPUT FOCUS */
        .inputBox:focus {
            border: 1px solid #00eaff;
            box-shadow: 0 0 0 2px rgba(0, 234, 255, 0.2);
        }

        /* ERROR (shape change হবে না) */
        .inputBox.error {
            border: 1px solid #ef4444;
            background: #ffffff;
        }

        /* ERROR TEXT */
        .errorText {
            color: #ef4444;
            font-size: 12px;
            display: none;
        }

        /* ROW (input + button same line থাকবে সবসময়) */
        .inputRow {
            width: 100%;
            display: flex;
            gap: 10px;
        }

        /* BUTTON */
        .btnVerify {
            white-space: nowrap;
            padding: 12px 18px;

            border-radius: 12px;
            border: none;

            background: #ffffff;
            color: #000000;

            font-weight: 600;
            cursor: pointer;

            transition: 0.25s;
        }

        /* BUTTON HOVER */
        .btnVerify:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
        }

        /* MOBILE FIX (shape break হবে না) */
        @media(max-width: 500px) {
            .inputRow {
                flex-direction: column;
            }

            .btnVerify {
                width: 100%;
            }
        }

        /* ===== MODERN LOGIN UI ===== */

        .authContainer {
            width: 700px;
            max-width: 95%;
            height: 320px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            margin: auto;
            background: white;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            transition: 0.5s;
        }

        /* PANEL */
        .panel {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* LEFT */
        .leftPanel {
            background: linear-gradient(135deg, #6d5dfc, #8f6eff);
            color: white;
            text-align: center;
        }

        /* RIGHT */
        .rightPanel {
            background: white;
            color: black;
        }

        /* INPUT */
        .inputBox {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        /* BUTTON */
        .btnVerify {
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #6d5dfc;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        /* SWITCH BUTTON */
        .switchBtn {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid white;
            background: transparent;
            color: white;
            cursor: pointer;
        }

        /* ERROR */
        .errorText {
            color: red;
            font-size: 12px;
            display: none;
        }

        /* TOGGLE MODE */
        .authContainer.active .leftPanel {
            order: 2;
        }

        .authContainer.active .rightPanel {
            order: 1;
        }

        /* MOBILE */
        @media(max-width:600px) {
            .authContainer {
                flex-direction: column;
                height: auto;
            }
        }


















        /* TOGGLE SWITCH */
        .switch {
            position: relative;
            width: 50px;
            height: 26px;
        }

        .switch input {
            display: none;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #cbd5f5;
            border-radius: 30px;
            transition: 0.3s;
        }

        .slider::before {
            content: "";
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            top: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked+.slider {
            background: #4f46e5;
        }

        input:checked+.slider::before {
            transform: translateX(24px);
        }


























        /* ===== PREMIUM DELETE MODAL ===== */

        #confirmBox {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;

            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);

            z-index: 9999;

            animation: fadeIn 0.3s ease;
        }

        /* modal card */
        #confirmBox>div {
            background: var(--card);
            color: var(--text);

            padding: 22px;
            width: 300px;

            border-radius: 18px;
            text-align: center;

            border: 1px solid var(--border);

            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);

            animation: scaleIn 0.25s ease;
        }

        /* text */
        #confirmBox div div:first-child {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* buttons container */
        #confirmBox div div:last-child {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }

        /* delete button */
        #confirmBox button:first-child {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;

            background: #ef4444;
            color: white;

            cursor: pointer;
            transition: 0.2s;
        }

        #confirmBox button:first-child:hover {
            background: #dc2626;
        }

        /* cancel button */
        #confirmBox button:last-child {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;

            background: var(--pri);
            color: white;

            cursor: pointer;
            transition: 0.2s;
        }

        #confirmBox button:last-child:hover {
            opacity: 0.9;
        }

        /* animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div id="authBox">

        <div class="authContainer" id="authUI">

            <!-- LEFT PANEL -->
            <div class="panel leftPanel">
                <h2 id="leftTitle">Login</h2> <!-- LEFT -->
                <p id="leftText">Don't have an account?</p>
                <button onclick="switchInput()" id="switchBtn" class="switchBtn">Password</button>
            </div>

            <!-- RIGHT PANEL -->
            <div class="panel rightPanel">

                <h2 id="formTitle">Login</h2> <!-- RIGHT (এটা থাকবে) -->

                <input id="emailInput" class="inputBox" placeholder="Email">
                <input id="passwordInput" type="password" class="inputBox" placeholder="Password" style="display:none;">

                <button class="btnVerify" onclick="loginNow()">Login</button>

                <div id="errorText" class="errorText">Wrong credentials</div>

            </div>

        </div>

    </div>

    <!-- HEADER -->
    <div class="header">
        <div class="title">PEKO AI • admin panel</div>
        <button onclick="delAll()" style="
padding:8px 14px;
border:none;
border-radius:10px;
background:#ef4444;
color:white;
cursor:pointer;
font-size:12px;
margin-left:10px;
">
            Delete All
        </button>
        <label class="switch">
            <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
            <span class="slider"></span>
        </label>
    </div>



    <div class="container">
        <select id="timeFilter" onchange="render()" style="padding:10px;border-radius:10px;">
            <option value="all">All</option>
            <option value="today">Today</option>
            <option value="7d">Last 7 Days</option>
            <option value="1m">Last Month</option>
            <option value="1y">Last Year</option>
        </select>
    </div>



    <div class="container" id="grid"></div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>

        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
            setTimeout(() => {
                document.getElementById("themeToggle").checked = true;
            }, 100);
        }


        const firebaseConfig = {
            apiKey: "AIzaSyCRafdTA1UA6uTTcACZNWOf02T1sGcdToQ",
            authDomain: "peko-ai.firebaseapp.com",
            databaseURL: "https://peko-ai-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "peko-ai"
        };
        firebase.initializeApp(firebaseConfig);

        const DB = firebase.database();
        const auth = firebase.auth();

        const ADMIN_EMAIL = "salmanfarsi172007@gmail.com";

        /* EMAIL OTP LOGIN */
        function sendLink() {

            const input = document.getElementById("emailInput");
            const pass = document.getElementById("passwordInput");
            const error = document.getElementById("errorText");

            const email = input.value.trim();
            const password = pass ? pass.value.trim() : "";

            const ADMIN_PASS = "123456"; // 👉 নিজের password

            // EMAIL CHECK
            if (email !== ADMIN_EMAIL) {
                input.classList.add("error");
                error.style.display = "block";
                return;
            }

            // PASSWORD CHECK
            if (password !== ADMIN_PASS) {
                if (pass) pass.classList.add("error");
                error.style.display = "block";
                return;
            }

            input.classList.remove("error");
            if (pass) pass.classList.remove("error");
            error.style.display = "none";

            // SUCCESS LOGIN
            document.getElementById("authBox").style.display = "none";
            toast("Login Success");
        }

        if (auth.isSignInWithEmailLink(window.location.href)) {

            let email = localStorage.getItem("emailForSignIn");

            if (!email) {
                email = prompt("Enter your email again");
            }

            auth.signInWithEmailLink(email, window.location.href)
                .then(res => {
                    if (res.user.email === ADMIN_EMAIL) {
                        document.getElementById("authBox").style.display = "none";
                        toast("Login Success (Email Link)");
                    } else {
                        alert("Denied");
                    }
                })
                .catch(() => {
                    alert("Login Failed");
                });
        }

        /* THEME */
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
        }

        /* TOAST */
        function toast(t) {
            let el = document.getElementById("toast");
            el.innerText = t;
            el.classList.add("show");
            setTimeout(() => el.classList.remove("show"), 1500);
        }

        /* RENDER DATA */
        let RAW = {};

        DB.ref("all_logs").on("value", snap => {
            RAW = snap.val() || {};
            render();
        });

        function render() {


            const filter = document.getElementById("timeFilter")?.value || "all";
            const now = new Date();

            let grid = document.getElementById("grid");
            grid.innerHTML = "";

            Object.entries(RAW).reverse().forEach(([k, d]) => {

                let div = document.createElement("div");
                div.className = "card";

                // ⏰ TIME তৈরি
                let time = d.time ? new Date(d.time) : new Date();

                let diff = now - time;
                let show = true;

                if (filter === "today") {
                    show = time.toDateString() === now.toDateString();
                }
                else if (filter === "7d") {
                    show = diff <= 7 * 86400000;
                }
                else if (filter === "1m") {
                    show = diff <= 30 * 86400000;
                }
                else if (filter === "1y") {
                    show = diff <= 365 * 86400000;
                }

                if (!show) return;

                let fullTime = time.toLocaleString("en-BD", {
                    year: "numeric",
                    month: "long",
                    day: "numeric",
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit"
                });

                div.innerHTML = `
<div class="name">${d.name || "Unknown"}</div>

<div class="email">${d.email || "No Email"}</div>

<div class="meta">${fullTime}</div>

<div class="q">${d.question || ""}</div>

<div class="actions">
<button class="icon copy" onclick="copy('${k}')">Copy</button>
<button class="icon del" onclick="del('${k}')">Delete</button>
</div>
`;

                grid.appendChild(div);
            });
        }
        /* ACTION */
        function copy(k) {
            navigator.clipboard.writeText(RAW[k].question || "");
            toast("Copied");
        }

        let DELETE_ID = null;

        function del(k) {
            DELETE_ID = k;
            document.getElementById("confirmBox").style.display = "flex";
        }
        function delAll() {
            DELETE_ID = "ALL";
            document.getElementById("confirmBox").style.display = "flex";
        }




        function loginNow() {

            const email = document.getElementById("emailInput").value.trim();
            const pass = document.getElementById("passwordInput").value.trim();
            const error = document.getElementById("errorText");

            const ADMIN_PASSWORD = "123456";

            // 👉 PASSWORD MODE
            if (showingPassword) {

                // OFF থাকলে block
                if (PASSWORD_ENABLED === "OFF") {
                    error.style.display = "block";
                    error.innerText = "Password login disabled";
                    return;
                }

                if (pass === ADMIN_PASSWORD) {
                    error.style.display = "none";
                    document.getElementById("authBox").style.display = "none";
                    toast("Login Success (Password)");
                } else {
                    error.style.display = "block";
                    error.innerText = "Wrong password";
                }

                return;
            }

            // 👉 EMAIL MODE
            else {

                if (email !== ADMIN_EMAIL) {
                    error.style.display = "block";
                    error.innerText = "Wrong email";
                    return;
                }

                error.style.display = "none";

                const actionCodeSettings = {
                    url: window.location.href,
                    handleCodeInApp: true
                };

                auth.sendSignInLinkToEmail(email, actionCodeSettings)
                    .then(() => {
                        localStorage.setItem("emailForSignIn", email);
                        toast("Link sent to your email");
                    })
                    .catch((err) => {
                        console.log(err);
                        toast("Email send failed");
                    });

                return;
            }
        }





        function closeConfirm() {
            const box = document.getElementById("confirmBox");

            box.style.opacity = "0";

            setTimeout(() => {
                box.style.display = "none";
                box.style.opacity = "1";
            }, 200);

            DELETE_ID = null;
        }

        function confirmDelete() {

            if (DELETE_ID === "ALL") {
                DB.ref("all_logs").remove();
                toast("All Deleted");
            }
            else if (DELETE_ID) {
                DB.ref("all_logs/" + DELETE_ID).remove();
                toast("Deleted");
            }

            closeConfirm();
        }





        let showingPassword = false;

        const PASSWORD_ENABLED = "ON";
        // 👉 "ON" দিলে password কাজ করবে
        // 👉 "OFF" দিলে password সবসময় ভুল দেখাবে

        function switchInput() {

            const email = document.getElementById("emailInput");
            const pass = document.getElementById("passwordInput");
            const btn = document.getElementById("switchBtn");
            const title = document.getElementById("formTitle");

            showingPassword = !showingPassword;

            if (showingPassword) {

                // 👉 PASSWORD MODE
                email.style.display = "none";
                pass.style.display = "block";

                btn.innerText = "Email";
                title.innerText = "Login (Password)";

            } else {

                // 👉 EMAIL MODE
                email.style.display = "block";
                pass.style.display = "none";

                btn.innerText = "Password";
                title.innerText = "Login (Email)";
            }
        }
    </script>





    <!-- CUSTOM DELETE MODAL -->
    <div id="confirmBox" style="
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.4);
backdrop-filter: blur(6px);
z-index:9999;
">

        <div style="
    background:var(--card);
    padding:20px;
    border-radius:16px;
    width:300px;
    text-align:center;
    ">

            <div style="font-weight:600;margin-bottom:10px;">
                Delete this item?
            </div>

            <div style="display:flex;gap:10px;justify-content:center;margin-top:15px;">
                <button onclick="confirmDelete()">Delete</button>
                <button onclick="closeConfirm()">Cancel</button>
            </div>

        </div>
    </div>









</body>

</html>
