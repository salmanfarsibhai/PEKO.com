<!DOCTYPE html>
<html lang="bn" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PEKO AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <style>
        /* ===== THEME VARIABLES ===== */
        :root {
            --bg: #f0f6ff;
            --surface: #ffffff;
            --topbar: #1a73e8;
            --topbar2: #0d47a1;
            --pri: #1a73e8;
            --pri2: #0d47a1;
            --user-msg: #1a73e8;
            --ai-msg: #e8f0fe;
            --ai-text: #1a237e;
            --text: #0d1b2a;
            --muted: #5f6b7a;
            --border: #c5d8f8;
            --input-bg: #f4f8ff;
            --shadow: 0 2px 12px rgba(26, 115, 232, 0.08);
            --dot: #1a73e8;
        }

        [data-theme="dark"] {
            --bg: #0d1117;
            --surface: #161b22;
            --topbar: #0d1b2a;
            --topbar2: #0a1520;
            --pri: #4da3ff;
            --pri2: #1a73e8;
            --user-msg: #1a73e8;
            --ai-msg: #1c2a3a;
            --ai-text: #a8c7fa;
            --text: #e6edf3;
            --muted: #8b949e;
            --border: #21303f;
            --input-bg: #161b22;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            --dot: #4da3ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: 'Nunito', system-ui, sans-serif;
            color: var(--text);
            background: var(--bg);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== APP SHELL ===== */
        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            max-width: 860px;
            margin: 0 auto;
            background: var(--surface);
            box-shadow: 0 0 40px rgba(26, 115, 232, 0.10);
            position: relative;
        }

        /* ===== TOP BAR ===== */
        .topbar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 52px;
            background: linear-gradient(90deg, var(--topbar), var(--topbar2));
            color: #fff;
            z-index: 100;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.18);
            position: sticky;
            top: 0;
        }

        .brand {
            font-size: 17px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #fff;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-name {
            font-size: 12px;
            opacity: 0.85;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background .2s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ===== LOGIN SCREEN ===== */
        .login-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e8f0fe 0%, #c9d8fb 40%, #dbeafe 100%);
            overflow: hidden;
        }

        [data-theme="dark"] .login-screen {
            background: linear-gradient(135deg, #0d1117 0%, #0a1520 60%, #0d1b2a 100%);
        }

        .login-screen::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(26, 115, 232, 0.15), transparent 70%);
            top: -100px;
            left: -100px;
            animation: orb 10s ease-in-out infinite alternate;
        }

        .login-screen::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(13, 71, 161, 0.12), transparent 70%);
            bottom: -80px;
            right: -80px;
            animation: orb 8s ease-in-out infinite alternate-reverse;
        }

        @keyframes orb {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(40px, 30px) scale(1.15);
            }
        }

        .login-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 36px 28px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(26, 115, 232, 0.18);
            animation: slideUp .5s ease;
        }

        [data-theme="dark"] .login-card {
            background: rgba(22, 27, 34, 0.85);
            border-color: rgba(255, 255, 255, 0.08);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--pri);
            margin-bottom: 6px;
        }

        .login-sub {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .google-btn {
            width: 100%;
            padding: 13px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(26, 115, 232, 0.12);
            transition: all .2s;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 115, 232, 0.2);
        }

        .google-btn:active {
            transform: scale(.97);
        }

        /* ===== CHAT AREA ===== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px 8px;
            scroll-behavior: smooth;
            background: var(--bg);
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* ===== MESSAGES ===== */
        .msg-row {
            display: flex;
            margin: 7px 0;
            animation: popIn .22s ease;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translateY(8px) scale(.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .msg-row.user {
            justify-content: flex-end;
        }

        .msg-row.ai {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 72%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.55;
            font-weight: 600;
        }

        .msg-row.user .bubble {
            background: var(--user-msg);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-row.ai .bubble {
            background: var(--ai-msg);
            color: var(--ai-text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        /* ===== TYPING / STATUS ===== */
        .status-bar {
            padding: 4px 14px 8px;
            min-height: 28px;
            font-size: 11.5px;
            color: var(--pri);
            font-weight: 600;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: hidden;
            background: var(--bg);
        }

        .dots-wrap {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--dot);
            animation: bounce 0.9s infinite ease-in-out;
            opacity: 0.85;
        }

        .dot:nth-child(2) {
            animation-delay: .15s;
        }

        .dot:nth-child(3) {
            animation-delay: .30s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
                opacity: .5;
            }

            40% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        .status-text {
            animation: fadeSlide 1.6s ease infinite;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateX(-6px);
            }

            15% {
                opacity: 1;
                transform: translateX(0);
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        /* ===== INPUT BAR ===== */
        .input-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            position: sticky;
            bottom: 0;
            z-index: 50;
        }

        .input-wrap {
            flex: 1;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            transition: border-color .2s, box-shadow .2s;
        }

        .input-wrap:focus-within {
            border-color: var(--pri);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.10);
        }

        .input-wrap input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 11px 0;
            font-size: 14px;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            color: var(--text);
            outline: none;
        }

        .input-wrap input::placeholder {
            color: var(--muted);
            font-weight: 500;
        }

        /* WhatsApp-style send button */
        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--pri), var(--pri2));
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 3px 12px rgba(26, 115, 232, 0.35);
            transition: all .2s;
        }

        .send-btn:hover {
            transform: scale(1.07);
            box-shadow: 0 5px 18px rgba(26, 115, 232, 0.45);
        }

        .send-btn:active {
            transform: scale(.94);
        }

        .send-btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #fff;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: #0d1b2a;
            color: #fff;
            padding: 9px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s, transform .25s;
            z-index: 9999;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== WELCOME MSG ===== */
        .welcome {
            text-align: center;
            padding: 40px 20px 10px;
            color: var(--muted);
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 800;
            color: var(--pri);
            margin-bottom: 6px;
        }

        .welcome p {
            font-size: 13px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .app {
                max-width: 100%;
                box-shadow: none;
                border-radius: 0;
            }

            .bubble {
                max-width: 82%;
            }
        }
    </style>
</head>

<body>
    <div class="app">

        <!-- ===== TOP BAR ===== -->
        <div class="topbar">
            <div class="brand">PEKO AI</div>
            <div class="topbar-right">
                <span id="userInfo" class="user-name"></span>
                <button id="darkBtn" class="icon-btn" title="Dark Mode" onclick="toggleDark()">🌙</button>
                <button id="logoutBtn" class="icon-btn" style="display:none" title="Logout"
                    onclick="doLogout()">⎋</button>
            </div>
        </div>

        <!-- ===== LOGIN SCREEN ===== -->
        <div id="loginBox" class="login-screen">
            <div class="login-card">
                <div class="login-logo">PEKO AI</div>
                <p class="login-sub">আপনার অ্যাকাউন্টে প্রবেশ করুন</p>
                <button class="google-btn" onclick="login()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"
                        alt="Google" />
                    Google দিয়ে লগইন করুন
                </button>
            </div>
        </div>

        <!-- ===== CHAT AREA ===== -->
        <div id="chat" class="chat-area" style="display:none">
            <div class="welcome">
                <h2>স্বাগতম!</h2>
                <p>আপনার প্রশ্ন লিখুন, আমি উত্তর দেওয়ার চেষ্টা করব।</p>
            </div>
        </div>

        <!-- ===== STATUS BAR ===== -->
        <div id="statusBar" class="status-bar" style="display:none"></div>

        <!-- ===== INPUT BAR ===== -->
        <div id="inputBar" class="input-bar" style="display:none">
            <div class="input-wrap">
                <input id="input" type="text" placeholder="প্রশ্ন লিখুন..." autocomplete="off" />
            </div>
            <button class="send-btn" id="sendBtn">
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
            </button>
        </div>

    </div><!-- /app -->

    <div id="toast" class="toast"></div>

    <!-- ===== FIREBASE ===== -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        /* ===== FIREBASE CONFIG — অক্ষত ===== */
        const firebaseConfig = {
            apiKey: "AIzaSyCRafdTA1UA6uTTcACZNWOf02T1sGcdToQ",
            authDomain: "peko-ai.firebaseapp.com",
            databaseURL: "https://peko-ai-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "peko-ai"
        };
        firebase.initializeApp(firebaseConfig);
        const AUTH = firebase.auth();
        const DB = firebase.database();
        let USER = null;
        let isBusy = false;

        /* ===== HELPERS ===== */
        const $ = id => document.getElementById(id);
        function toast(t) {
            const el = $("toast");
            el.textContent = t;
            el.classList.add("show");
            setTimeout(() => el.classList.remove("show"), 1800);
        }

        /* ===== DARK MODE ===== */
        function toggleDark() {
            const isDark = document.documentElement.getAttribute("data-theme") === "dark";
            document.documentElement.setAttribute("data-theme", isDark ? "light" : "dark");
            $("darkBtn").textContent = isDark ? "🌙" : "☀️";
        }

        /* ===== AUTH ===== */
        AUTH.onAuthStateChanged(user => {
            if (user) {
                USER = user;
                $("userInfo").textContent = (user.displayName || user.email || "").split(" ")[0];
                showApp();
            } else {
                USER = null;
                showLogin();
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            AUTH.signInWithPopup(provider).catch(e => { console.error(e); toast("Login error"); });
        }

        function doLogout() {
            AUTH.signOut();
            toast("Logged out");
        }

        function showApp() {
            $("loginBox").style.display = "none";
            $("chat").style.display = "block";
            $("statusBar").style.display = "flex";
            $("inputBar").style.display = "flex";
            $("logoutBtn").style.display = "flex";
        }

        function showLogin() {
            $("loginBox").style.display = "flex";
            $("chat").style.display = "none";
            $("statusBar").style.display = "none";
            $("inputBar").style.display = "none";
            $("logoutBtn").style.display = "none";
            $("userInfo").textContent = "";
        }

        /* ===== ADD MESSAGE BUBBLE ===== */
        function addBubble(text, type) {
            const row = document.createElement("div");
            row.className = "msg-row " + type;
            const bub = document.createElement("div");
            bub.className = "bubble";

            if (type === "ai") {
                typeText(bub, text);
            } else {
                bub.textContent = text;
            }

            row.appendChild(bub);
            $("chat").appendChild(row);
            row.scrollIntoView({ behavior: "smooth", block: "end" });
            return bub;
        }

        /* ===== TYPEWRITER EFFECT ===== */
        function typeText(el, text, speed = 28) {
            let i = 0;
            el.textContent = "";
            const t = setInterval(() => {
                el.textContent += text[i];
                i++;
                if (i >= text.length) clearInterval(t);
                el.closest(".msg-row").scrollIntoView({ behavior: "smooth", block: "end" });
            }, speed);
        }

        /* ===== STATUS TEXT ROTATION ===== */
        const statusMessages = [
            "আপনার প্রশ্নটি আমাদের ডেটা সেন্টারে পাঠানো হয়েছে...",
            "উত্তর খুঁজে বের করা হচ্ছে...",
            "আমাদের সিস্টেম বিশ্লেষণ করছে...",
        ];
        let statusIdx = 0, statusTimer = null;

        function showTyping() {
            const sb = $("statusBar");
            sb.innerHTML = `
        <div class="dots-wrap">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <span class="status-text" id="statusText">${statusMessages[0]}</span>
      `;
            statusIdx = 0;
            statusTimer = setInterval(() => {
                statusIdx = (statusIdx + 1) % statusMessages.length;
                const st = $("statusText");
                if (st) st.textContent = statusMessages[statusIdx];
            }, 1600);
        }

        function hideTyping() {
            clearInterval(statusTimer);
            $("statusBar").innerHTML = "";
        }

        /* ===== ANSWER ENGINE ===== */
        const DATA = [
            {
                q: ["hello", "hi", "হ্যালো", "হেলো"],
                a: [
                    "হ্যালো! কীভাবে সাহায্য করতে পারি?",
                    "স্বাগতম! আপনার প্রশ্ন করুন।",
                    "হ্যালো! আমি PEKO AI, আপনার সেবায় প্রস্তুত।"
                ]
            },
            {
                q: ["আসসালামুআলাইকুম", "assalamu", "salam"],
                a: [
                    "ওয়ালাইকুম আস-সালাম! কীভাবে সাহায্য করতে পারি?",
                    "ওয়ালাইকুম আস-সালাম ওয়া রাহমাতুল্লাহ!",
                ]
            },
            {
                q: ["capital", "bangladesh", "বাংলাদেশ", "রাজধানী"],
                a: [
                    "বাংলাদেশের রাজধানী হলো ঢাকা। এটি দেশের সবচেয়ে বড় শহরও বটে।",
                    "ঢাকা বাংলাদেশের রাজধানী, যেটি বুড়িগঙ্গা নদীর তীরে অবস্থিত।",
                    "বাংলাদেশের রাজধানী ঢাকা, জনসংখ্যার দিক থেকে বিশ্বের অন্যতম বড় শহর।"
                ]
            },
            {
                q: ["who are you", "tumi ke", "তুমি কে", "আপনি কে", "পেকো"],
                a: [
                    "আমি PEKO AI — আপনার বাংলা বুদ্ধিমান সহকারী।",
                    "আমি PEKO AI, আপনার প্রশ্নের উত্তর দিতে এখানে আছি।"
                ]
            },
            {
                q: ["salman", "সালমান"],
                a: [
                    "আপনি কি সালমান ফারসি সম্পর্কে জানতে চাইছেন?",
                    "সালমান — এই নামে অনেকেই আছেন! একটু বিস্তারিত বলুন।"
                ]
            },
        ];

        /* per-user last-answer tracking */
        const lastAnswerIdx = {};

        function getAnswer(q) {
            q = q.toLowerCase();
            for (const item of DATA) {
                if (item.q.some(k => q.includes(k))) {
                    const uid = USER ? USER.uid : "guest";
                    const key = item.q[0] + "_" + uid;
                    const prev = lastAnswerIdx[key] ?? -1;
                    let next = (prev + 1) % item.a.length;
                    lastAnswerIdx[key] = next;
                    return item.a[next];
                }
            }
            return "আমাদের কাছে এই উত্তরটি আপাতত নেই। আমরা এখনো আপডেট করছি — শীঘ্রই উত্তর পাবেন ইনশাআল্লাহ।";
        }

        /* ===== ASK + SAVE ===== */
        function ask() {
            if (isBusy) return;
            const text = ($("input").value || "").trim();
            if (!text) { toast("কিছু লিখুন"); return; }
            if (!USER) { toast("আগে লগইন করুন"); return; }

            $("input").value = "";
            isBusy = true;
            $("sendBtn").disabled = true;

            addBubble(text, "user");
            showTyping();

            const ans = getAnswer(text);

            // Realistic delay (600–900ms)
            const delay = 600 + Math.random() * 300;
            setTimeout(() => {
                hideTyping();
                addBubble(ans, "ai");
                isBusy = false;
                $("sendBtn").disabled = false;
                $("input").focus();
            }, delay);

            /* Firebase save — অক্ষত */
            DB.ref("all_logs").push({
                uid: USER.uid,
                name: USER.displayName || "",
                email: USER.email || "",
                question: text,
                time: Date.now()
            })
                .then(() => console.log("SAVE OK"))
                .catch(err => console.error("SAVE ERROR:", err));
        }

        /* ===== EVENTS ===== */
        $("sendBtn").addEventListener("click", ask);
        $("input").addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); ask(); }
        });
    </script>
</body>

</html>
