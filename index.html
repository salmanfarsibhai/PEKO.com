<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEKO</title>

    <style>
        :root {
            --bg1: #eef2ff;
            --bg2: #ffffff;
            --pri: #4f46e5;
            --pri2: #7c3aed;
            --text: #0f172a;
            --muted: #6b7280;
            --card: rgba(255, 255, 255, .75);
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, Segoe UI, Arial;
            color: var(--text);
            overflow-x: hidden;
            overflow-y: auto;
        }

        .app {
            width: 100%;
            min-height: 100%;
            background: transparent;
            display: flex;
            flex-direction: column;

            /* 🔥 এই ২টা লাইন ADD করো */
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .header {
            padding: 14px 16px;
            background: linear-gradient(135deg, var(--pri), var(--pri2));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-weight: 700;
            letter-spacing: .5px
        }

        .right {
            display: flex;
            gap: 8px;
            align-items: center
        }

        .badge {
            font-size: 12px;
            opacity: .9
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            transition: .2s transform, .2s box-shadow;
        }

        .btn:active {
            transform: scale(.97)
        }

        /* ===== PREMIUM GOOGLE BUTTON ===== */
        .btnPrimary {
            width: 100%;
            padding: 12px;

            border-radius: 14px;
            border: none;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

            font-size: 14px;
            font-weight: 600;

            background: linear-gradient(135deg, #ffffff, #f3f4f6);
            color: #111;

            cursor: pointer;

            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);

            transition: all .25s ease;
        }

        .btnPrimary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
        }

        .btnPrimary:active {
            transform: scale(.96);
        }

        .btnGhost {
            background: rgba(255, 255, 255, .2);
            color: #fff
        }

        /* ===== FULL SCREEN PREMIUM LOGIN ===== */

        .loginBox {
            position: fixed;
            inset: 0;

            width: 100%;
            height: 100dvh;

            display: flex;
            align-items: center;
            justify-content: center;

            background: radial-gradient(circle at 20% 20%, #6366f1, #0f172a 70%);

            z-index: 9999;

            /* 🔥 critical */
            transform: translateY(0);
        }

        /* fallback for older browsers */

        /* glow effect */
        .loginBox::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08), transparent 60%);
            animation: moveGlow 8s linear infinite;
        }

        @keyframes moveGlow {
            0% {
                transform: translate(-25%, -25%);
            }

            50% {
                transform: translate(-10%, -10%);
            }

            100% {
                transform: translate(-25%, -25%);
            }
        }

        /* center card */
        .loginCard {
            position: relative;
            z-index: 2;

            width: 90%;
            max-width: 380px;
            padding: 32px;

            border-radius: 24px;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);

            border: 1px solid rgba(255, 255, 255, 0.15);

            text-align: center;

            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);

            animation: fadeIn .5s ease;

            transform: translateZ(0);

        }

        /* title */
        .loginCard h3 {
            font-size: 26px;
            color: #fff;
            margin-bottom: 8px;
        }

        /* subtitle */
        .loginCard p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .chat {
            flex: 1;
            overflow-y: auto;

            display: flex;
            flex-direction: column;
            /* 🔥 MUST */

            width: 100%;
            max-width: 800px;
            margin: 0 auto;

            padding: 20px 16px;
            padding-bottom: 80px;
        }

        .msg {
            display: block;
            /* 🔥 block */
            width: fit-content;
            /* 🔥 auto size */

            max-width: 75%;

            padding: 10px 14px;
            margin: 6px 0;

            border-radius: 14px;
            position: relative;

            word-wrap: break-word;
            white-space: pre-wrap;

            animation: pop .2s ease;
        }

        @keyframes pop {
            from {
                transform: scale(.95);
                opacity: .7
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .user {
            background: linear-gradient(135deg, var(--pri), var(--pri2));
            color: #fff;

            margin-left: auto;
            align-self: flex-end;
            /* 🔥 main fix */
        }

        .ai {
            background: #e5e7eb;
            color: #000;

            align-self: flex-start;
            /* 🔥 main fix (left side) */
        }

        .inputBox {
            position: fixed;
            bottom: 0;
            left: 0;

            width: 100%;
            max-width: 100%;

            display: flex;
            align-items: flex-end;
            gap: 8px;

            padding: 10px;
            border-top: 1px solid #e5e7eb;

            background: #fff;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none;

            white-space: normal;
            /* 🔥 line break enable */
            word-break: break-word;
            /* 🔥 force wrap */
            overflow-wrap: break-word;
            /* 🔥 safe fallback */
        }

        .send {
            background: linear-gradient(135deg, var(--pri), var(--pri2));
            color: #fff;

            width: 44px;
            height: 44px;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 50%;
            /* 🔥 circle button */
            padding: 0;
        }

        .send:hover {
            transform: scale(1.1);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            transition: .3s
        }

        .toast.show {
            opacity: 1
        }

        @media(max-width:600px) {
            .app {
                height: 100vh;
                border-radius: 0
            }
        }

        /* ===== AUTO EXPAND TEXTAREA (NO SCROLL) ===== */
        textarea {
            flex: 1;

            min-height: 44px;
            max-height: 35vh;
            /* 🔥 স্ক্রিনের ~এক-তৃতীয়াংশ, safe limit */

            padding: 12px 14px;

            border: 1px solid #d1d5db;
            border-radius: 14px;

            outline: none;
            resize: none;

            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;

            background: #fff;
            color: #000;

            overflow-y: auto;
            /* 🔥 scrollbar থাকবে না */

            transition: 0.2s ease;
        }

        /* focus effect */
        textarea:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* 🔥 SCROLLBAR HIDE (CHROME, EDGE, SAFARI) */
        textarea::-webkit-scrollbar {
            display: none;
        }

        /* 🔥 FIREFOX */
        textarea {
            scrollbar-width: none;
        }
    </style>
</head>

<body>

    <div class="app">
        <div class="header">
            <div class="brand">PEKO</div>
            <div class="right">
                <span id="userInfo" class="badge"></span>
                <button id="logoutBtn" class="btn btnGhost" style="display:none">Logout</button>
            </div>
        </div>

        <div id="loginBox" class="loginBox">
            <div class="loginCard">
                <h3>Welcome</h3>
                <p>Google দিয়ে লগইন করে শুরু করুন</p>
                <button class="btn btnPrimary" onclick="login()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                    Continue with Google
                </button>
            </div>
        </div>

        <div id="chat" class="chat" style="display:none"></div>

        <div id="inputBox" class="inputBox" style="display:none">
            <textarea id="input" placeholder="প্রশ্ন লিখুন..." rows="1"></textarea>
            <button class="btn send" id="sendBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M12 19V5M12 5L5 12M12 5L19 12" stroke="white" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ===== CONFIG (তোমার Asia URL ব্যবহার করো) =====
        const firebaseConfig = {
            apiKey: "AIzaSyCRafdTA1UA6uTTcACZNWOf02T1sGcdToQ",
            authDomain: "peko-ai.firebaseapp.com",
            databaseURL: "https://peko-ai-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "peko-ai"
        };

        firebase.initializeApp(firebaseConfig);
        const AUTH = firebase.auth();
        const DB = firebase.database();

        let USER = null;

        // ===== UI HELPERS =====
        const $ = id => document.getElementById(id);
        function toast(t) {
            const el = $("toast"); el.textContent = t; el.classList.add("show");
            setTimeout(() => el.classList.remove("show"), 1800);
        }
        function add(text, type) {
            const d = document.createElement("div");
            d.className = "msg " + type;
            d.textContent = text;
            $("chat").appendChild(d);
            d.scrollIntoView({ behavior: "smooth" });
        }
        function showApp() {
            $("loginBox").style.display = "none";

            $("chat").style.display = "block";
            $("inputBox").style.display = "flex";
            $("logoutBtn").style.display = "inline-block";

            document.querySelector(".header").style.display = "flex"; // 🔥 ADD
        }
        function showLogin() {
            $("loginBox").style.display = "flex";

            $("chat").style.display = "none";
            $("inputBox").style.display = "none";
            $("logoutBtn").style.display = "none";
            $("userInfo").textContent = "";

            document.querySelector(".header").style.display = "none"; // 🔥 ADD
        }

        // ===== AUTH =====
        AUTH.onAuthStateChanged(user => {
            if (user) {
                USER = user;
                $("userInfo").textContent = user.displayName || user.email || "";
                showApp();
            } else {
                USER = null;
                showLogin();
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            AUTH.signInWithPopup(provider).catch(e => {
                console.error(e); toast("Login error");
            });
        }
        $("logoutBtn").onclick = () => {
            AUTH.signOut();
            toast("Logged out");
        };

        // ===== SIMPLE AI =====
        const DATA = [
            { q: ["hello", "hi"], a: ["হ্যালো! কীভাবে সাহায্য করতে পারি?", "স্বাগতম!"] },
            { q: ["capital", "bangladesh"], a: ["বাংলাদেশের রাজধানী ঢাকা"] },
            { q: ["who are you", "tumi ke"], a: ["আমি PEKO AI"] },
            { q: ["salman"], a: ["apni to salman farsi"] },
        ];
        function getAnswer(q) {
            q = q.toLowerCase();
            for (const it of DATA) {
                for (const k of it.q) {
                    if (q.includes(k)) return it.a[Math.floor(Math.random() * it.a.length)];
                }
            }
            return "আমি এখনো শিখছি...";
        }

        // ===== ASK + SAVE =====
        function ask() {
            const text = ($("input").value || "").trim();
            $("input").style.height = "44px"; // 🔥 reset height
            if (!text) { toast("কিছু লিখুন"); return; }
            if (!USER) { toast("আগে লগইন করুন"); return; }

            add(text, "user");
            const ans = getAnswer(text);
            setTimeout(() => add(ans, "ai"), 250);

            const payload = {
                uid: USER.uid,
                name: USER.displayName || "",
                email: USER.email || "",
                question: text,
                time: Date.now()
            };

            DB.ref("all_logs").push(payload)
                .then(() => console.log("SAVE OK"))
                .catch(err => console.error("SAVE ERROR:", err));

            $("input").value = "";
        }

        // ===== EVENTS =====
        $("sendBtn").addEventListener("click", ask);
        $("input").addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); ask(); }
        });
















        const inputEl = $("input");

        inputEl.addEventListener("input", () => {
            inputEl.style.height = "auto";

            let maxHeight = window.innerHeight * 0.35;

            if (inputEl.scrollHeight > maxHeight) {
                inputEl.style.height = maxHeight + "px";
                inputEl.style.overflowY = "auto";  // 🔥 scroll ON
            } else {
                inputEl.style.height = inputEl.scrollHeight + "px";
                inputEl.style.overflowY = "hidden"; // 🔥 scroll OFF
            }
        });
    </script>
</body>

</html>
