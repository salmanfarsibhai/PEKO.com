    <title>PEKO</title>

    <style>
        :root {
            --bg1: #eef2ff;
            --bg2: #ffffff;
            --pri: #0083ff;
            --pri2: #0083ff;
            --text: #0f172a;
            --muted: #6b7280;
            --card: rgba(255, 255, 255, .75);
        }

        * {
            box-sizing: border-box
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            position: fixed; 
            top: 0;
            left: 0;
            font-family: 'Noto Sans Bengali', system-ui, sans-serif;
            color: var(--text);
            transition: background-color 0.3s ease, color 0.3s ease; /* 🔥 ডার্ক মোডের স্মুথ সিঙ্ক */
        }

        .app {
            width: 100%;
            background: transparent;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .header {
    padding: 14px 16px;
    background: linear-gradient(135deg, var(--pri), var(--pri2));
    color: #fff;

    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
    flex-shrink: 0; /* কিবোর্ড উঠলে টপবার ছোট হবে না */
}

        .brand{

    display:flex;

    align-items:center;

    gap:10px;

    min-width:0;
}

/* LOGO CIRCLE */

.brandLogoWrap{

    width:42px;

    height:42px;

    min-width:42px;

    min-height:42px;

    border-radius:50%;

    overflow:hidden;

    background:#ffffff;

    display:flex;

    align-items:center;

    justify-content:center;

    flex-shrink:0;
}

/* LOGO IMAGE */

.brandLogo{

    width:100%;

    height:100%;

    object-fit:cover;

    display:block;
}

/* TEXT */

.brandText{

    font-size:22px;

    font-weight:700;

    letter-spacing:.5px;

    color:#ffffff;

    line-height:1;

    white-space:nowrap;
}

        .right {
            display: flex;
            gap: 8px;
            align-items: center
        }

        .badge {
            font-size: 12px;
            opacity: .9
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            transition: .2s transform, .2s box-shadow;
        }

        .btn:active {
            transform: scale(.97)
        }

        /* ===== PREMIUM GOOGLE BUTTON ===== */
        .btnPrimary {
            width: 100%;
            padding: 12px;

            border-radius: 14px;
            border: none;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

            font-size: 14px;
            font-weight: 600;

            background: linear-gradient(135deg, #ffffff, #f3f4f6);
            color: #111;

            cursor: pointer;

            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);

            transition: all .25s ease;
        }

        .btnPrimary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
        }

        .btnPrimary:active {
            transform: scale(.96);
        }

        .btnGhost {
    background: #ffffff;
    color: #ef4444;
}

        /* ===== FULL SCREEN PREMIUM LOGIN ===== */

        .loginBox {
            position: fixed;
            inset: 0;

            width: 100%;
            height: 100dvh;

            display: flex;
            align-items: center;
            justify-content: center;

            background:var(--pri);

            z-index: 9999;

            /* 🔥 critical */
            transform: translateY(0);
        }

        /* fallback for older browsers */

        /* glow effect */
        .loginBox::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08), transparent 60%);
            animation: moveGlow 8s linear infinite;
        }

        @keyframes moveGlow {
            0% {
                transform: translate(-25%, -25%);
            }

            50% {
                transform: translate(-10%, -10%);
            }

            100% {
                transform: translate(-25%, -25%);
            }
        }

        /* center card */
        .loginCard {
            position: relative;
            z-index: 2;

            width: 90%;
            max-width: 380px;
            padding: 32px;

            border-radius: 24px;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);

            border: 1px solid rgba(255, 255, 255, 0.15);

            text-align: center;

            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);

            animation: fadeIn .5s ease;

            transform: translateZ(0);

        }

        /* title */
        .loginCard h3 {
            font-size: 26px;
            color: #fff;
            margin-bottom: 8px;
        }

        /* subtitle */
        .loginCard p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .chat {
            flex: 1;
            min-height: 0;
            overflow-y: auto;

            display: flex;
            flex-direction: column;
            /* 🔥 MUST */

            width: 100%;
            max-width: 800px;
            margin: 0 auto;

            padding: 20px 16px;
        }

        .msg {
            display: block;
            /* 🔥 block */
            width: fit-content;
            /* 🔥 auto size */

            max-width: 75%;
            

            padding: 10px 14px;
            margin: 6px 0;

            border-radius: 14px;
            position: relative;

            word-wrap: break-word;
            white-space: pre-wrap;

            animation: pop .2s ease;
            font-family: 'Noto Sans Bengali', system-ui, sans-serif;
font-weight: 400;
        }

        @keyframes pop {
            from {
                transform: scale(.95);
                opacity: .7
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .user {
            background: linear-gradient(135deg, var(--pri), var(--pri2));
            color: #fff;

            margin-left: auto;
            align-self: flex-end;
            /* 🔥 main fix */
        }

        .ai {
            background: #e5e7eb;
            color: #000;

            align-self: flex-start;
            /* 🔥 main fix (left side) */
        }

        .inputBox {
            flex-shrink: 0; /* কিবোর্ড উঠলে ইনপুট বক্স গায়েব হবে না */
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 12px;
            background: #fff; /* ডার্ক মোডের জন্য আপনার আগের কোডই কাজ করবে */
            z-index: 1000;
        }


        .send {
            background: linear-gradient(135deg, var(--pri), var(--pri2));
            color: #fff;

            width: 44px;
            height: 44px;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 50%;
            /* 🔥 circle button */
            padding: 0;
        }

        .send:hover {
            transform: scale(1.1);
        }

        /* 🔥 AI ভাবার সময় ভেতরের সাদা চতুর্ভুজের ডিজাইন ও অ্যানিমেশন */
        .thinking-square {
            width: 14px;
            height: 14px;
            background-color: white;
            border-radius: 3px;
            animation: pulseSquare 0.8s infinite alternate ease-in-out;
        }

        @keyframes pulseSquare {
            0% { transform: scale(0.85); opacity: 0.8; border-radius: 3px; }
            100% { transform: scale(1.1); opacity: 1; border-radius: 5px; }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            transition: .3s
        }

        .toast.show {
            opacity: 1
        }

        @media(max-width:600px) {
            .app {
                height: 100vh;
                border-radius: 0
            }
        }

        /* ===== AUTO EXPAND TEXTAREA (NO SCROLL) ===== */
        textarea {
            flex: 1;
            min-height: 44px;
            max-height: 35vh;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            outline: none;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            background: #fff;
            color: #000;
            overflow-y: auto;
            /* 🔥 ফোকাস অ্যানিমেশনের জন্য 0.2s, আর ডার্ক মোডের জন্য 0.3s */
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.3s ease, color 0.3s ease;
        }

        /* focus effect */
        textarea:focus {
    border-color: transparent;
    box-shadow:0 0 10px var(--pri);
}

        /* 🔥 SCROLLBAR HIDE (CHROME, EDGE, SAFARI) */
        textarea::-webkit-scrollbar {
            display: none;
        }

        /* 🔥 FIREFOX */
        textarea {
            scrollbar-width: none;
        }




/* Hide Scrollbar */

.chat::-webkit-scrollbar {
    display: none;
}

.chat {
    scrollbar-width: none;
    -ms-overflow-style: none;
}








/* FULL SCROLLBAR HIDE */

/* Chrome, Edge, Safari */
::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
}

/* Firefox */
* {
    scrollbar-width: none;
}

/* IE & Old Edge */
* {
    -ms-overflow-style: none;
}








/* Remove Blue Click Highlight */

* {
    -webkit-tap-highlight-color: transparent;
}

button,
textarea,
input,
a,
div {
    outline: none !important;
    -webkit-focus-ring-color: transparent !important;
}

*:focus {
    outline: none !important;
}









.limitPopup{
    position: fixed;

    left: 50%;
    bottom: -100px;

    transform: translateX(-50%);

     background:var(--pri);

    color: white;

    padding: 12px 18px;

    border-radius: 14px;

    font-size: 14px;

    z-index: 999999;

    transition: .4s ease;

    box-shadow: 0 10px 30px rgba(0,131,255,.25);

    opacity: 0;
}

.limitPopup.show{
    bottom: 95px;

    opacity: 1;

    animation: popupBounce .4s ease;
}

@keyframes popupBounce{

    0%{
        transform: translateX(-50%) translateY(40px);
    }

    60%{
        transform: translateX(-50%) translateY(-6px);
    }

    100%{
        transform: translateX(-50%) translateY(0);
    }

}




/* 🔥 Premium Neural Wave Animation */
.pekoLoading {
    background: #ffffff !important; /* প্রিমিয়াম লুকের জন্য সাদা ব্যাকগ্রাউন্ড */
    border:1px solid color-mix(
in srgb,
var(--pri) 20%,
transparent
);/* হালকা ব্লু বর্ডার */
    box-shadow:
0 4px 15px color-mix(
in srgb,
var(--pri) 18%,
transparent
) !important; /* ম্যাজিক্যাল গ্লো */
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 14px 18px !important;
    border-radius: 16px !important;
}

.neural-wave {
    width: 5px;
    height: 6px;
    background: var(--pri);
    border-radius: 10px;
    animation: neuralPulse 1s infinite ease-in-out;
}

.neural-wave:nth-child(1) { animation-delay: -0.4s; }
.neural-wave:nth-child(2) { animation-delay: -0.2s; }
.neural-wave:nth-child(3) { animation-delay: 0s; }

@keyframes neuralPulse {
    0%, 100% { 
        height: 6px; 
        background: #93c5fd; /* হালকা নীল */
        box-shadow: 0 0 0 transparent; 
    }
    50% { 
        height: 22px; /* ওয়েভ বড় হবে */
        background: var(--pri); /* গাঢ় নীল */
        box-shadow: 0 0 8px var(--pri); /* গ্লো করবে */
    }
}

/* =========================
   THEME SYSTEM
========================= */

.themeRow{

    margin-top:22px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding-top:18px;
}

.themeToggleBtn{

    border:none;

    background:transparent;

    color:inherit;

    display:flex;

    align-items:center;

    gap:10px;

    cursor:pointer;
}

.themeSelected{

    display:flex;

    align-items:center;

    gap:8px;
}

.selectedThemeDot{

    width:10px;
    height:10px;

    border-radius:50%;

    background:var(--pri);
}

.themeArrow{

    width:18px;
    height:18px;

    display:flex;

    align-items:center;
    justify-content:center;

    color:#bdbdbd;

    transition:
    transform .28s cubic-bezier(.4,0,.2,1),
    opacity .25s ease;

    flex-shrink:0;
}

.rotateArrow{

    transform:
    rotate(180deg)
    translateY(-1px);
}

.themeDropdown{

    margin-top:14px;
    width:50%;

margin-left:auto;

    background:#353535;

    border-radius:18px;

    overflow:hidden;

    max-height:0;

    opacity:0;

    transition:
    max-height .35s ease,
    opacity .25s ease;

    pointer-events:none;
}

.themeDropdown.show{

    max-height:500px;

    opacity:1;

    pointer-events:auto;
}
.rotateArrow{

    transform:rotate(180deg);
}

.themeItem{

    padding:14px 16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    cursor:pointer;

    transition:.2s;
    color:#fff;
}

.themeItem:hover{

    background:rgba(255,255,255,.05);
}

.themeLeft{

    display:flex;

    align-items:center;

    gap:12px;
}

.themeDot{

    width:11px;
    height:11px;

    border-radius:50%;
}

.themeCheck{

    opacity:0;

    color:#ffffff;

    font-size:15px;

    font-weight:600;

    line-height:1;

    display:flex;

    align-items:center;

    justify-content:center;

    width:18px;

    transition:
    opacity .2s ease,
    transform .2s ease;

    transform:scale(.8);
}

.themeItem.activeTheme .themeCheck{

    opacity:1;

    transform:scale(1);
}

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s ease;
        }

        body.dark #aiLoader {
            background: #07111f; /* ডার্ক মোডের ব্যাকগ্রাউন্ড */
        }

        #aiLoader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* 3D Hologram Area */
        .hologram-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 800px; /* ত্রিমাত্রিক (3D) ফিল দেওয়ার জন্য */
            transform-style: preserve-3d;
        }

        .holo-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-sizing: border-box;
        }

        /* X-Axis Spinning Ring */
        .holo-x {
            border:2px solid color-mix(
in srgb,
var(--pri) 25%,
transparent
);
            border-top:3px solid var(--pri);
            border-bottom:3px solid var(--pri);
            animation: spinX 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Y-Axis Spinning Ring */
        .holo-y {
            border:2px solid color-mix(
in srgb,
var(--pri) 25%,
transparent
);
            border-left:3px solid var(--pri);
            border-right:3px solid var(--pri);
            animation: spinY 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Z-Axis Dashed Radar */
        .holo-z {
            width: 125%; /* একটু বড় থাকবে */
            height: 125%;
            border:2px dashed var(--pri);
            animation: spinZ 4s linear infinite;
        }

        /* Glowing Center Brain/Core */
        .holo-core {
            width: 24px;
            height: 24px;
            background:var(--pri);
            border-radius: 50%;
            box-shadow:
0 0 12px color-mix(
in srgb,
var(--pri) 45%,
transparent
),
0 0 28px color-mix(
in srgb,
var(--pri) 25%,
transparent
);
            animation: coreBeat 1s ease-in-out infinite alternate;
        }

        /* Futuristic Text Styling */
        .holo-text {
            margin-top: 45px;
            font-family: monospace, system-ui; /* সাই-ফাই লুকের জন্য স্পেশাল ফন্ট স্টাইল */
            font-size: 15px;
            font-weight: 700;
            color: var(--pri);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            opacity: 0.9;
        }

        /* Smart Bouncing Dots */
        .ai-dots span {
            animation: typingDots 1.4s infinite both;
            font-size: 20px;
            margin-left: 3px;
        }
        .ai-dots span:nth-child(1) { animation-delay: 0s; }
        .ai-dots span:nth-child(2) { animation-delay: 0.2s; }
        .ai-dots span:nth-child(3) { animation-delay: 0.4s; }

        /* 3D Animations */
        @keyframes spinX {
            0% { transform: rotateX(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateZ(180deg); }
        }
        @keyframes spinY {
            0% { transform: rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateY(360deg) rotateZ(-180deg); }
        }
        @keyframes spinZ {
            0% { transform: rotateZ(0deg); }
            100% { transform: rotateZ(360deg); }
        }
        @keyframes coreBeat {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% {

    transform: scale(1.3);

    opacity: 1;

    box-shadow:
    0 0 18px color-mix(

        var(--pri) 40%,
        transparent
    ),
    0 0 40px color-mix(
        in srgb,
        var(--pri) 18%,
        transparent
    );

}
        }
        @keyframes typingDots {
            0%, 80%, 100% { opacity: 0; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-4px); }
        }
    </style>
</head>

// ===============================
// RANDOM PICKER
// ===============================

function pick(arr){

    return arr[
        Math.floor(Math.random() * arr.length)
    ];

}



// ===============================
// MAIN DETECTOR
// ===============================

function detectSpamType(text){

    if(!text) return null;

    const q = text.trim();

    const lower = q.toLowerCase();




    // =========================
    // EMPTY / DOT SPAM
    // =========================

    if(/^[.\-_ ]+$/.test(q)){

        return "emptySpam";

    }




    // =========================
    // EMOJI SPAM
    // =========================

    const emojiCount =
        (q.match(/[\u{1F300}-\u{1FAFF}]/gu)||[]).length;

    if(emojiCount >= 4){

        return "emojiSpam";

    }




    // =========================
    // SYMBOL SPAM
    // =========================

    if(/^[^a-zA-Z0-9\u0980-\u09FF]+$/.test(q)){

        return "symbolSpam";

    }




    // =========================
    // REPEATED CHARACTER
    // =========================

    if(/(.)\1{4,}/i.test(q)){

        return "repeatedChars";

    }




    // =========================
    // NUMBER SPAM
    // =========================

    if(/^\d+$/.test(q)){

        return "numberSpam";

    }




    // =========================
    // FAKE MATH
    // =========================

    if(
        /^[0-9+\-*/%=(). ]+$/.test(q)
        &&
        !/^\d+([+\-*/]\d+)+$/.test(q)
    ){

        return "fakeMath";

    }




    // =========================
    // FAKE LINK
    // =========================

    if(

        /(http|www)/i.test(q)
        &&
        !/^https?:\/\/.+\..+/.test(q)

    ){

        return "fakeLink";

    }




    // =========================
    // CAPS SPAM
    // =========================

    if(

        q.length > 6
        &&
        q === q.toUpperCase()
        &&
        /[A-Z]/.test(q)

    ){

        return "capsSpam";

    }




    // =========================
    // USERNAME STYLE
    // =========================

    if(

        /^[a-zA-Z0-9_]{8,20}$/.test(q)
        &&
        /\d/.test(q)
        &&
        /[A-Z]/.test(q)

    ){

        return "usernameSpam";

    }




    // =========================
    // KEYBOARD SMASH ENGLISH
    // =========================

    const englishOnly =
        /^[a-z0-9]+$/i.test(q);

    const vowels =
        (lower.match(/[aeiou]/g)||[]).length;

    if(

        englishOnly
        &&
        q.length >= 6
        &&
        vowels <= 1

    ){

        return "keyboardSmash";

    }




    // =========================
    // BANGLA SMASH
    // =========================

    const banglaOnly =
        /^[\u0980-\u09FF]+$/.test(q);

    if(

        banglaOnly
        &&
        q.length >= 5

    ){

        const banglaReadable =
            /(আমি|তুমি|কি|কেন|হয়|না|এটা|ভালো|কেমন)/.test(q);

        if(!banglaReadable){

            return "banglaSmash";

        }

    }




    // =========================
    // TINY RANDOM NOISE
    // =========================

    if(

        q.length <= 4
        &&
        /^[a-z]+$/i.test(q)

    ){

        const validTinyWords = [

            "hi",
            "hey",
            "ok",
            "yo",
            "no",
            "yes"

        ];

        if(

            !validTinyWords.includes(lower)

        ){

            return "tinyNoise";

        }

    }




    // =========================
    // LONG RANDOM GARBAGE
    // =========================

    if(

        q.length >= 15

    ){

        const spaces =
            (q.match(/ /g)||[]).length;

        const vowels2 =
            (lower.match(/[aeiou]/g)||[]).length;

        if(

            spaces === 0
            &&
            vowels2 <= 2

        ){

            return "longGarbage";

        }

    }




    // =========================
    // MIXED RANDOM GARBAGE
    // =========================

    const hasEnglish =
        /[a-z]/i.test(q);

    const hasBangla =
        /[\u0980-\u09FF]/.test(q);

    const hasNumber =
        /\d/.test(q);

    if(

        (
            hasEnglish +
            hasBangla +
            hasNumber
        ) >= 2

        &&

        q.length >= 8

    ){

        const words =
            q.split(/\s+/);

        if(words.length <= 2){

            return "mixedGarbage";

        }

    }




    // =========================
    // REPEAT WORD SPAM
    // =========================

    const repeatMatch =
        lower.match(/\b(\w+)\s+\1\b/);

    if(repeatMatch){

        return "repeatQuestion";

    }




    return null;

}

        // 100% STABLE TOPBAR & KEYBOARD FIX (APPLE iOS + ANDROID)
        // ========================================
        function setAppHeight() {
            const appWrap = document.querySelector('.app');
            
            // Apple/iOS এর জন্য visualViewport ব্যবহার (সবচেয়ে জরুরি)
            let vh = window.innerHeight;
            let offset = 0;
            
            if (window.visualViewport) {
                vh = window.visualViewport.height;
                offset = window.visualViewport.offsetTop; // iOS এ কিবোর্ড পুরো পেজকে যতটুকু ধাক্কা দিয়ে উপরে তুলবে, এটা তার মাপ
            }
            
            // অ্যাপের হাইট ঠিক করা
            appWrap.style.height = vh + 'px';
            
            // 🔥 ম্যাজিক ফিক্স: iOS এ বডি ধাক্কা দিয়ে উপরে উঠলে অ্যাপটিকে ঠিক ততটুকু নিচে নামিয়ে স্ক্রিনে লক করা
            appWrap.style.transform = `translateY(${offset}px)`; 
            
            // পেজ যেন অযথা স্ক্রল না হয় সেটা লক রাখা
            window.scrollTo(0, 0);

            // চ্যাট স্ক্রল সবসময় নিচে রাখা
            const chatContainer = document.getElementById('chat');
            if (chatContainer) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        // সাধারণ পেজ লোড ও রিসাইজ ইভেন্ট (Android & PC)
        window.addEventListener('resize', setAppHeight);
        
        // 🔥 Apple/iOS এর স্পেশাল ইভেন্ট লিসেনার
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', setAppHeight);
            window.visualViewport.addEventListener('scroll', setAppHeight); // iOS এ কিবোর্ড উঠলে মূলত scroll ইভেন্ট ফায়ার হয়
        }

            });
